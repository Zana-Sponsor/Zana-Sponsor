<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxo Live - پسوولەی ڕیکلامەکان</title>
    <link rel="icon" type="image/jpeg" href="https://image2url.com/r2/default/images/1772248056478-a5a04d98-be5f-4ee9-8f08-09db2be8fd1a.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { --primary: #22c55e; --soft-bg: #e2e8f0; --card-white: #ffffff; --text-dark: #0f172a; --text-gray: #64748b; --border: #cbd5e1; --red: #ef4444; }
        body { background-color: var(--soft-bg); color: var(--text-dark); font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; }

        /* ستایلی شاشەی ڕاگرتنی سێرڤەر */
        #hacked-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: #000; color: #ff0000; z-index: 100000; font-family: 'Courier New', monospace;
            text-align: center; justify-content: center; align-items: center; flex-direction: column; direction: ltr;
        }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s;
        }
        .loader-box { position: relative; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; }
        .loader-circle {
            position: absolute; width: 100%; height: 100%;
            border: 4px solid transparent; border-top-color: #22c55e;
            border-bottom-color: #22c55e; border-radius: 50%;
            animation: spin-custom 1.5s linear infinite;
        }
        .loader-img { width: 50px; height: 50px; object-fit: contain; border-radius: 10px; }
        .loading-text { margin-top: 25px; font-weight: 900; color: #0f172a; font-size: 14px; animation: fade-text 1s infinite alternate; }
        @keyframes spin-custom { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fade-text { from { opacity: 0.4; } to { opacity: 1; } }

        .main-header { background: white; padding: 15px 5%; border-bottom: 2px dashed var(--border); position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 500px; margin: auto; display: flex; justify-content: space-between; align-items: center; }
        .logo-img { height: 22px; }
        
        .live-indicator {
            display: flex; align-items: center; gap: 6px; background: #f0fdf4;
            padding: 4px 12px; border-radius: 50px; color: #16a34a; font-size: 11px; font-weight: 900; border: 1px solid #dcfce7;
        }
        .live-dot { width: 7px; height: 7px; background-color: #22c55e; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }

        .container { padding: 20px 5%; max-width: 500px; margin: auto; }
        .ad-card { background: var(--card-white); padding: 25px 20px 40px 20px; margin-bottom: 30px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-radius: 15px; }
        .middle-section { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .ad-thumb { width: 75px; height: 75px; border-radius: 12px; object-fit: cover; }
        .stats-grid { border-top: 1px dashed #e2e8f0; padding-top: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; }
        .stat-label { font-size: 9px; color: var(--text-gray); }
        .stat-value { font-size: 11px; font-weight: 900; display: block; }
    </style>
</head>
<body>

    <div id="hacked-screen">
        <h1 style="font-size: 35px; text-shadow: 0 0 20px #f00;">⚠️ SYSTEM TERMINATED ⚠️</h1>
        <div style="margin: 20px; padding: 20px; border: 1px solid #f00; background: rgba(255,0,0,0.1); max-width: 90%; word-break: break-word;">
            <p id="hacked-msg" style="font-size: 18px; color: #fff;"></p>
        </div>
        <p style="color: #444; font-size: 11px;">[ SECURITY BY X-TEAM ]</p>
    </div>

    <div id="loading-screen">
        <div class="loader-box">
            <div class="loader-circle"></div>
            <img src="https://image2url.com/r2/default/images/1772248056478-a5a04d98-be5f-4ee9-8f08-09db2be8fd1a.jpg" class="loader-img">
        </div>
        <div class="loading-text">خەریکی گەڕانین...</div>
    </div>

    <header class="main-header">
        <div class="header-content">
            <img src="https://image2url.com/r2/default/images/1771403050640-6d5e5c5e-a1dc-45de-a7f4-b5f386e82668.png" class="logo-img">
            <div class="live-indicator"><div class="live-dot"></div><span>ڕاستەوخۆ</span></div>
        </div>
    </header>

    <div class="container">
        <div id="live-ads-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://rtbsblgaewmfiynhwgkv.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0YnNibGdhZXdtZml5bmh3Z2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzODIwNDcsImV4cCI6MjA4Njk1ODA0N30.-aEC48G8Hltu6N8y2nPhAYPdB-4PSsR78OSXSLMAGcU';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function checkStatus() {
            try {
                // لێرە گۆڕانکاری سەرەکیم کردووە: order('id', { ascending: false }) 
                // واتە نوێترین ڕیز بێنە، نەک تەنها ئایدی 1
                const { data, error } = await supabaseClient
                    .from('tiktok_report2')
                    .select('is_live, hack_message')
                    .order('id', { ascending: false })
                    .limit(1)
                    .single();

                if (data) {
                    const status = String(data.is_live).toLowerCase();
                    const isStopped = (status === 'false' || data.is_live === false);
                    
                    if (isStopped) {
                        document.getElementById('hacked-screen').style.display = 'flex';
                        document.getElementById('hacked-msg').innerText = data.hack_message || "Access Restricted.";
                        document.body.style.overflow = "hidden";
                    } else {
                        document.getElementById('hacked-screen').style.display = 'none';
                        document.body.style.overflow = "auto";
                    }
                }
            } catch (e) { console.error("Status check failed", e); }
        }

        async function fetchLiveAds() {
            await checkStatus();
            const urlParams = new URLSearchParams(window.location.search);
            const specificId = urlParams.get('id');
            
            // هەموو ڕیزەکان دێنێت جگە لەوانەی ناویان تێستە
            let query = supabaseClient.from('tiktok_report2').select('*').neq('customer_name', 'Proxo Final Test');
            if (specificId) query = query.eq('id', specificId);

            const { data, error } = await query;
            if (!error) { renderAds(data); }
            hideLoading();
        }

        function renderAds(ads) {
            const container = document.getElementById('live-ads-container');
            if (!ads || ads.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#94a3b8;">هیچ ڕیکلامێک نییە</p>';
                return;
            }
            // فیلتەرکردنی ئەو ڕیزانەی کە تەنها بۆ ڕێکخستنی سێرڤەرن و زانیاری ڕیکلامیان تێدا نییە
            const filteredAds = ads.filter(ad => ad.customer_name && ad.customer_name !== "");

            container.innerHTML = filteredAds.map(ad => `
                <div class="ad-card">
                    <div class="middle-section">
                        <img src="${ad.thumbnail_url || 'https://via.placeholder.com/80'}" class="ad-thumb">
                        <div>
                            <strong style="display:block;">${ad.customer_name}</strong>
                            <span style="font-size:11px; color:#64748b;">ID: #${ad.ad_id || '0000'}</span>
                        </div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-box"><span class="stat-label">بینین</span><span class="stat-value">${(ad.impressions || 0).toLocaleString()}</span></div>
                        <div class="stat-box"><span class="stat-label">کلیک</span><span class="stat-value">${(ad.clicks || 0).toLocaleString()}</span></div>
                        <div class="stat-box"><span class="stat-label">خەرجی</span><span class="stat-value">$${ad.spend || 0}</span></div>
                        <div class="stat-box"><span class="stat-label">بودجە</span><span class="stat-value">$${ad.budget || 0}</span></div>
                    </div>
                </div>
            `).join('');
        }

        function hideLoading() {
            const loader = document.getElementById('loading-screen');
            if(loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.visibility = 'hidden', 600);
            }
        }

        setInterval(checkStatus, 2000); // ٢ چرکە جارێک دۆخەکە بپشکنە
        window.onload = fetchLiveAds;
    </script>
</body>
</html>
