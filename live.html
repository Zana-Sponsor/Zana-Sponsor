<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxo Live - چاودێری ڕاستەوخۆ</title>
    <link rel="icon" type="image/jpeg" href="https://image2url.com/r2/default/images/1772248056478-a5a04d98-be5f-4ee9-8f08-09db2be8fd1a.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #22c55e; --soft-bg: #f8fafc; --card-white: #ffffff; --text-dark: #0f172a; --text-gray: #64748b; --border: #f1f5f9; --red: #ef4444; }
        body { background-color: var(--soft-bg); color: var(--text-dark); font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; }

        .main-header { background: white; padding: 15px 5%; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 500px; margin: auto; display: flex; justify-content: space-between; align-items: center; }
        .logo-img { height: 22px; }
        
        .live-indicator {
            display: flex; align-items: center; gap: 6px; background: #f0fdf4;
            padding: 4px 12px; border-radius: 50px; color: #16a34a; font-size: 12px; font-weight: 900; border: 1px solid #dcfce7;
        }
        .live-dot { width: 8px; height: 8px; background-color: #22c55e; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .refresh-btn { cursor: pointer; width: 40px; height: 40px; background: var(--soft-bg); border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: 0.3s; color: var(--text-dark); border: none; }
        .spinning { animation: spin 0.8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container { padding: 20px 5%; max-width: 500px; margin: auto; }

        .filter-wrapper { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; margin-bottom: 20px; padding-bottom: 5px; }
        .filter-wrapper::-webkit-scrollbar { display: none; }
        .filter-btn { white-space: nowrap; padding: 8px 16px; border-radius: 50px; border: 1px solid var(--border); background: white; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--text-gray); transition: 0.3s; }
        .filter-btn.active { background: var(--text-dark); color: white; border-color: var(--text-dark); }

        .ad-card { background: var(--card-white); border-radius: 28px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.03); overflow: hidden; }
        
        /* دیزاینی نوێی ئایدی */
        .id-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .id-badge { 
            background: #f8fafc; color: #94a3b8; padding: 4px 10px; border-radius: 8px; 
            font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 4px;
            border: 1px dashed #e2e8f0;
        }
        .platform-chip { padding: 5px 12px; border-radius: 10px; font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px; background: #f1f5f9; }
        
        .thumb-box { text-align: center; margin-bottom: 15px; }
        .ad-thumb { width: 95px; height: 95px; border-radius: 28px; object-fit: cover; border: 4px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        
        .budget-tag { display: inline-flex; align-items: center; gap: 6px; background: #f0fdf4; color: #16a34a; padding: 6px 16px; border-radius: 50px; font-size: 15px; font-weight: 900; margin-top: 10px; }

        .time-info { display: flex; justify-content: space-between; background: #f8fafc; padding: 10px; border-radius: 15px; margin: 15px 0; border: 1px dashed #e2e8f0; }
        .time-block { text-align: center; flex: 1; }
        .time-label { display: block; font-size: 10px; color: var(--text-gray); font-weight: 700; }
        .time-val { display: block; font-size: 11px; font-weight: 900; color: var(--text-dark); }

        .progress-section { margin: 18px 0; }
        .progress-info { display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; margin-bottom: 6px; color: var(--text-gray); }
        .progress-bar-bg { background: #f1f5f9; height: 7px; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { background: linear-gradient(90deg, #22c55e, #4ade80); height: 100%; transition: width 0.5s linear; }
        .bg-red { background: var(--red) !important; }

        .status-badge { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 16px; font-size: 13px; font-weight: 800; }
        .active-bg { background: #f0fdf4; color: #166534; }
        .completed-bg { background: #f1f5f9; color: #64748b; }
        .rejected-bg { background: #fef2f2; color: #dc2626; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .stat-box { background: var(--soft-bg); padding: 12px 5px; border-radius: 18px; text-align: center; border: 1px solid #f1f5f9; }
        .stat-value { display: block; font-size: 14px; font-weight: 900; }
        .stat-label { font-size: 10px; color: var(--text-gray); }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <a href="https://www.proxopages.com">
                <img src="https://image2url.com/r2/default/images/1771403050640-6d5e5c5e-a1dc-45de-a7f4-b5f386e82668.png" class="logo-img">
            </a>
            <div class="live-indicator">
                <div class="live-dot"></div>
                <span>ڕاستەوخۆ</span>
            </div>
            <button class="refresh-btn" onclick="refreshData()">
                <i class="fas fa-sync-alt" id="refreshIcon"></i>
            </button>
        </div>
    </header>

    <div class="container">
        <div class="filter-wrapper">
            <button class="filter-btn active" onclick="filterAds('all', this)">هەمووی</button>
            <button class="filter-btn" onclick="filterAds('چالاکە', this)">چالاک</button>
            <button class="filter-btn" onclick="filterAds('تەواو بووە', this)">کۆتایی</button>
            <button class="filter-btn" onclick="filterAds('ڕەتکرایەوە', this)">ڕەتکراوە</button>
        </div>
        <div id="live-ads-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://rtbsblgaewmfiynhwgkv.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0YnNibGdhZXdtZml5bmh3Z2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzODIwNDcsImV4cCI6MjA4Njk1ODA0N30.-aEC48G8Hltu6N8y2nPhAYPdB-4PSsR78OSXSLMAGcU';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let allAdsData = [];
        let updateInterval;

        async function refreshData() {
            document.getElementById('refreshIcon').classList.add('spinning');
            await fetchLiveAds();
            setTimeout(() => document.getElementById('refreshIcon').classList.remove('spinning'), 800);
        }

        function formatAdDate(d) {
            if(!d) return "--/--";
            const date = new Date(d);
            return date.toLocaleDateString('ku-IQ', {month:'numeric', day:'numeric'}) + " " + 
                   date.toLocaleTimeString('ku-IQ', {hour:'2-digit', minute:'2-digit', hour12:true});
        }

        function calculateProgress(start, end, status) {
            if (status === 'rejected' || status === 'ڕەتکرایەوە') return 0;
            if (status === 'completed' || status === 'تەواو بووە') return 100;
            const startTime = new Date(start).getTime();
            const endTime = new Date(end).getTime();
            const now = new Date().getTime();
            if (now < startTime) return 0;
            if (now > endTime) return 100;
            return ((now - startTime) / (endTime - startTime)) * 100;
        }

        async function fetchLiveAds() {
            const { data, error } = await supabaseClient.from('ads1').select('*');
            if (error) return;

            allAdsData = data.map(ad => {
                const now = new Date();
                const start = new Date(ad.start_date);
                const end = new Date(ad.end_date);
                let s = { text: "تەواو بووە", icon: "fa-check-circle", class: "completed-bg", order: 2 };

                if (ad.status === 'rejected' || ad.status === 'ڕەتکرایەوە') {
                    s = { text: "ڕەتکرایەوە", icon: "fa-circle-xmark", class: "rejected-bg", order: 4 };
                } else if (ad.status === 'completed' || ad.status === 'تەواو بووە') {
                    s = { text: "تەواو بووە", icon: "fa-check-circle", class: "completed-bg", order: 2 };
                } else if (ad.status === 'active' || (now >= start && now <= end)) {
                    s = { text: "چالاکە", icon: "fa-bolt-lightning", class: "active-bg", order: 1 };
                }
                
                return { ...ad, statusInfo: s, currentProgress: calculateProgress(ad.start_date, ad.end_date, ad.status) };
            }).sort((a, b) => a.statusInfo.order - b.statusInfo.order);

            renderAds(allAdsData);
            startLiveUpdates();
        }

        function startLiveUpdates() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => {
                allAdsData.forEach(ad => {
                    if (ad.statusInfo.text === "چالاکە") {
                        const newProgress = calculateProgress(ad.start_date, ad.end_date, ad.status);
                        const bar = document.getElementById(`bar-${ad.id}`);
                        const text = document.getElementById(`text-${ad.id}`);
                        if (bar) bar.style.width = newProgress + '%';
                        if (text) text.innerText = newProgress.toFixed(2) + '%';
                    }
                });
            }, 1000);
        }

        function filterAds(status, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderAds(status === 'all' ? allAdsData : allAdsData.filter(ad => ad.statusInfo.text === status));
        }

        function renderAds(adsList) {
            const container = document.getElementById('live-ads-container');
            container.innerHTML = adsList.map(ad => {
                const isIQD = ad.currency === 'IQD';
                const s = ad.statusInfo;
                const isRejected = ad.status === 'rejected' || ad.status === 'ڕەتکرایەوە';
                
                return `
                    <div class="ad-card">
                        <div class="id-container">
                            <div class="id-badge">
                                <i class="fas fa-hashtag" style="font-size: 8px;"></i>
                                ID-${ad.tiktok_ad_id || '0000'}
                            </div>
                            <div class="platform-chip"><i class="fab fa-tiktok"></i> TikTok</div>
                        </div>
                        <div class="thumb-box">
                            <img src="${ad.thumbnail_url || ''}" class="ad-thumb">
                            <h3 style="margin:12px 0 2px 0; font-weight:900;">${ad.customer_name || ''}</h3>
                            <div class="budget-tag"><i class="fas fa-wallet"></i> ${isIQD ? (ad.budget || 0).toLocaleString() + ' د.ع' : '$' + (ad.budget || 0)}</div>
                        </div>
                        <div class="time-info">
                            <div class="time-block"><span class="time-label">دەستپێکردن</span><span class="time-val">${formatAdDate(ad.start_date)}</span></div>
                            <div style="align-self:center; color:#cbd5e1"><i class="fas fa-long-arrow-alt-left"></i></div>
                            <div class="time-block"><span class="time-label">کۆتایی</span><span class="time-val">${formatAdDate(ad.end_date)}</span></div>
                        </div>
                        <div class="progress-section">
                            <div class="progress-info"><span>بەڕێوەچوون</span><span id="text-${ad.id}">${ad.currentProgress.toFixed(2)}%</span></div>
                            <div class="progress-bar-bg">
                                <div id="bar-${ad.id}" class="progress-bar-fill ${isRejected ? 'bg-red' : ''}" style="width: ${ad.currentProgress}%"></div>
                            </div>
                        </div>
                        <div class="status-badge ${s.class}"><i class="fas ${s.icon}"></i> ${s.text}</div>
                        <div class="stats-grid">
                            <div class="stat-box"><span class="stat-value">${(ad.impressions || 0).toLocaleString()}</span><span class="stat-label">بینین</span></div>
                            <div class="stat-box"><span class="stat-value">${(ad.clicks || 0).toLocaleString()}</span><span class="stat-label">کلیک</span></div>
                            <div class="stat-box"><span class="stat-value">${isIQD ? (ad.spend || 0).toLocaleString() : '$'+(ad.spend || 0)}</span><span class="stat-label">خەرجی</span></div>
                        </div>
                    </div>`;
            }).join('');
        }

        window.onload = fetchLiveAds;
    </script>
</body>
</html>
