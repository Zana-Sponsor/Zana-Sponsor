<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxo Live - ئەنجامی ڕاستەوخۆ</title>
    <link rel="icon" type="image/jpeg" href="https://image2url.com/r2/default/images/1772248056478-a5a04d98-be5f-4ee9-8f08-09db2be8fd1a.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #22c55e;
            --soft-bg: #f8fafc;
            --card-white: #ffffff;
            --text-dark: #0f172a;
            --text-gray: #64748b;
            --border: #f1f5f9;
        }

        body { 
            background-color: var(--soft-bg); 
            color: var(--text-dark); 
            font-family: 'Vazirmatn', sans-serif; 
            margin: 0; padding: 0; 
        }

        nav { 
            padding: 12px 5%; background: white; 
            display: flex; justify-content: center; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .logo-img { height: 18px; opacity: 0.9; }

        .container { padding: 20px 5%; max-width: 500px; margin: auto; }

        .search-section {
            background: white; padding: 15px; border-radius: 20px;
            margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid var(--border);
        }
        .search-box {
            display: flex; gap: 8px; background: #f1f5f9;
            padding: 8px 12px; border-radius: 12px; align-items: center;
        }
        .search-box input {
            flex: 1; border: none; background: transparent;
            font-family: 'Vazirmatn'; font-size: 14px; outline: none;
            color: var(--text-dark);
        }
        .search-btn {
            background: var(--primary); color: white; border: none;
            padding: 8px 15px; border-radius: 10px; font-weight: 700;
            cursor: pointer; font-size: 13px; transition: 0.3s;
        }

        .top-status { text-align: center; margin-bottom: 20px; padding: 15px; }
        .status-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: #dcfce7; color: #15803d;
            padding: 6px 16px; border-radius: 50px;
            font-size: 13px; font-weight: 900; border: 1px solid #bbf7d0;
        }
        .pulse {
            width: 8px; height: 8px; background: #22c55e;
            border-radius: 50%; box-shadow: 0 0 0 rgba(34, 197, 94, 0.4);
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }

        .ad-card {
            background: var(--card-white); border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            padding: 20px; margin-bottom: 20px;
            border: 1px solid var(--border);
            position: relative;
        }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .order-id { color: var(--text-gray); font-size: 11px; font-weight: 700; background: #f8fafc; padding: 3px 10px; border-radius: 6px; }

        .countdown-box {
            padding: 10px; border-radius: 12px; margin: 10px 0;
            text-align: center; font-size: 13px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        
        .status-active-box { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .status-scheduled-box { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .status-completed-box { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }

        .divider { height: 1px; background: var(--border); margin: 15px 0; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .stat-box { 
            background: #fcfcfc; padding: 12px 4px; border-radius: 14px; 
            text-align: center; border: 1px solid #f8fafc;
        }
        .stat-box i { font-size: 14px; color: var(--text-gray); margin-bottom: 5px; display: block; }
        .stat-value { display: block; font-size: 16px; font-weight: 900; color: #0f172a; }
        .stat-label { font-size: 10px; color: var(--text-gray); font-weight: 400; }

        .thumb-box { text-align: center; margin: 15px 0; }
        .ad-thumb { width: 80px; height: 80px; border-radius: 15px; object-fit: cover; border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

        .sync-text { font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 5px; }
        .loading { text-align: center; padding: 40px; color: var(--text-gray); font-size: 13px; }
    </style>
</head>
<body>

    <nav>
        <img src="https://image2url.com/r2/default/images/1771403050640-6d5e5c5e-a1dc-45de-a7f4-b5f386e82668.png" class="logo-img">
    </nav>

    <div class="container">
        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search" style="color: #94a3b8;"></i>
                <input type="text" id="searchInput" placeholder="ئایدی یان PROXO-xxxx بنووسە...">
                <button class="search-btn" onclick="fetchLiveAds()">بگەڕێ</button>
            </div>
        </div>

        <div class="top-status">
            <div class="status-pill">
                <div class="pulse"></div>
                ئاماری ڕاستەوخۆ (LIVE)
            </div>
        </div>

        <div id="live-ads-container">
            <div class="loading">خەریکی بەستنەوەی داتاکانین...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://rtbsblgaewmfiynhwgkv.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0YnNibGdhZXdtZml5bmh3Z2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzODIwNDcsImV4cCI6MjA4Njk1ODA0N30.-aEC48G8Hltu6N8y2nPhAYPdB-4PSsR78OSXSLMAGcU';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // چارەسەری کۆتایی کات بێ پشت بەستن بە کاتی ناوخۆیی مۆبایل
        function getStatusInfo(startDate, endDate, manualStatus) {
            const now = new Date();
            
            function parseToKurd(isoStr) {
                const d = new Date(isoStr);
                // زیادکردنی ٣ کاتژمێر بۆ کاتی کوردستان
                return new Date(d.getTime() + (3 * 60 * 60 * 1000));
            }

            const kurdStart = parseToKurd(startDate);
            const kurdEnd = parseToKurd(endDate);

            const timeStr = kurdStart.getUTCHours().toString().padStart(2, '0') + ":" + 
                            kurdStart.getUTCMinutes().toString().padStart(2, '0');
            
            const dateStr = kurdStart.getUTCDate().toString().padStart(2, '0') + "/" + 
                            (kurdStart.getUTCMonth() + 1).toString().padStart(2, '0') + "/" + 
                            kurdStart.getUTCFullYear();

            // بەراوردکردنەکە بە UTC دەکرێت بۆ وردی زیاتر
            if (manualStatus === 'completed' || now.getTime() > new Date(endDate).getTime()) {
                return { text: "تەواو بووە", class: "status-completed-box", color: "#ef4444", icon: "fa-check-circle", label: "کۆتایی هات" };
            } else if (now.getTime() < new Date(startDate).getTime()) {
                return { 
                    text: "کات بۆ دانراو", 
                    class: "status-scheduled-box", 
                    color: "#2563eb", 
                    icon: "fa-calendar-alt", 
                    label: `دەست پێ دەکات: ${dateStr} - ${timeStr}` 
                };
            } else {
                return { 
                    text: "چالاکە", 
                    class: "status-active-box", 
                    color: "#10b981", 
                    icon: "fa-bolt", 
                    label: "کاتی ماوە: " + getTimeLeft(endDate) 
                };
            }
        }

        function getTimeLeft(endDate) {
            const diff = new Date(endDate).getTime() - new Date().getTime();
            if (diff <= 0) return "تەواو بووە";
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            return `${days}ڕ، ${hours}ک ماوە`;
        }

        async function fetchLiveAds() {
            const container = document.getElementById('live-ads-container');
            const searchVal = document.getElementById('searchInput').value.trim();
            const cleanId = searchVal.replace(/PROXO-/i, '');

            let query = supabaseClient.from('ads1').select('*');
            if (cleanId) query = query.eq('tiktok_ad_id', cleanId);

            const { data, error } = await query.order('created_at', { ascending: false });

            if (error) { container.innerHTML = `<div class="loading">هەڵەیەک ڕوویدا.</div>`; return; }

            if (data && data.length > 0) {
                container.innerHTML = '';
                data.forEach(ad => {
                    const statusInfo = getStatusInfo(ad.start_date, ad.end_date, ad.status);
                    container.innerHTML += `
                        <div class="ad-card" style="${statusInfo.text === 'تەواو بووە' ? 'opacity: 0.8;' : ''}">
                            <div class="card-header">
                                <span class="order-id">#PROXO-${ad.tiktok_ad_id || '0000'}</span>
                                <div class="sync-text" style="color: ${statusInfo.color}">
                                    <i class="fas ${statusInfo.icon}"></i> ${statusInfo.text}
                                </div>
                            </div>
                            <div class="thumb-box">
                                <img src="${ad.thumbnail_url || 'https://via.placeholder.com/80'}" class="ad-thumb">
                                <h3 style="font-size: 15px; margin: 10px 0 0 0;">${ad.customer_name || 'کڕیار'}</h3>
                            </div>
                            <div class="countdown-box ${statusInfo.class}">${statusInfo.label}</div>
                            <div class="divider"></div>
                            <div class="stats-grid">
                                <div class="stat-box"><i class="fas fa-eye"></i><span class="stat-value">${(ad.impressions || 0).toLocaleString()}</span><span class="stat-label">بینین</span></div>
                                <div class="stat-box"><i class="fas fa-mouse-pointer"></i><span class="stat-value">${(ad.clicks || 0).toLocaleString()}</span><span class="stat-label">کلیک</span></div>
                                <div class="stat-box"><i class="fas fa-tag"></i><span class="stat-value">$${parseFloat(ad.spend || 0).toFixed(1)}</span><span class="stat-label">خەرجکراو</span></div>
                            </div>
                        </div>`;
                });
            } else {
                container.innerHTML = `<div class="loading">هیچ زانیارییەک نەدۆزرایەوە.</div>`;
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') fetchLiveAds(); });
        supabaseClient.channel('live-updates').on('postgres_changes', { event: '*', schema: 'public', table: 'ads1' }, () => fetchLiveAds()).subscribe();
        window.onload = fetchLiveAds;
    </script>
</body>
</html>
