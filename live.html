<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxo Live</title>
    <link rel="icon" type="image/jpeg" href="https://image2url.com/r2/default/images/1772248056478-a5a04d98-be5f-4ee9-8f08-09db2be8fd1a.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #22c55e; --bg: #f3f4f6; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Vazirmatn', sans-serif;
            background: radial-gradient(circle at center, #ffffff 0%, #f3f4f6 100%);
            display: flex; align-items: center; justify-content: center;
            color: #1e293b;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 95%;
            max-width: 480px;
            padding: 20px;
        }

        .logo {
            width: 80px; height: 80px; border-radius: 24px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 2px solid white;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 45px 25px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 30px 60px rgba(0,0,0,0.03);
        }

        /* ئەنیمەیشنی نوێ بۆ ئایکۆنەکە */
        .maint-icon-box {
            margin-bottom: 20px;
            display: inline-block;
        }

        .maint-icon {
            font-size: 35px;
            color: var(--primary);
            filter: drop-shadow(0 0 10px rgba(34, 197, 94, 0.3));
            animation: spinGear 4s linear infinite;
        }

        @keyframes spinGear {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 { font-size: 22px; font-weight: 900; margin: 0 0 12px; color: #0f172a; }
        p { font-size: 14px; color: #64748b; line-height: 1.8; margin-bottom: 40px; }

        .timer-grid {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 45px;
        }
        .timer-item {
            flex: 1;
            background: #f3f4f6;
            padding: 18px 5px;
            border-radius: 24px;
            box-shadow: inset 6px 6px 12px #e5e7eb, inset -6px -6px 12px #ffffff;
            border: 1px solid rgba(255,255,255,0.5);
            transition: transform 0.3s ease;
        }
        
        .t-num {
            font-size: 26px;
            font-weight: 900;
            color: #0f172a;
            display: block;
            line-height: 1;
        }
        .t-label {
            font-size: 10px;
            color: #94a3b8;
            font-weight: 700;
            margin-top: 6px;
            display: block;
        }

        .timer-item.active {
            box-shadow: inset 4px 4px 8px rgba(34, 197, 94, 0.1), inset -4px -4px 8px #ffffff;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .timer-item.active .t-num { color: var(--primary); }

        .wa-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 22px;
            font-size: 15px;
            font-weight: 800;
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.2);
            transition: all 0.3s ease;
        }
        .wa-btn:hover { 
            background: #1eb956; 
            transform: translateY(-3px);
        }

        .footer-brand { margin-top: 50px; font-size: 10px; color: #cbd5e1; font-weight: 800; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://image2url.com/r2/default/images/1772248056478-a5a04d98-be5f-4ee9-8f08-09db2be8fd1a.jpg" class="logo">

        <div class="glass-panel">
            <div class="maint-icon-box">
                <i class="fas fa-cog maint-icon"></i>
            </div>
            
            <h1>سیستەم لەژێر چاککردنەوەدایە</h1>
            <p>پڕۆکسۆ هەوڵدەدات بۆ پێشکەشکردنی باشترین خزمەتگوزاری بە ئێوەی ئازیز، کەمێکی تر چاوەڕوان بن.</p>

            <div class="timer-grid">
                <div class="timer-item">
                    <span class="t-num" id="d">00</span>
                    <span class="t-label">ڕۆژ</span>
                </div>
                <div class="timer-item">
                    <span class="t-num" id="h">00</span>
                    <span class="t-label">کاژێر</span>
                </div>
                <div class="timer-item">
                    <span class="t-num" id="m">00</span>
                    <span class="t-label">خولەک</span>
                </div>
                <div class="timer-item active">
                    <span class="t-num" id="s">00</span>
                    <span class="t-label">چرکە</span>
                </div>
            </div>

            <a href="https://wa.me/9647758887488" class="wa-btn">
                <i class="fab fa-whatsapp fa-lg"></i>
                پەیوەندی بۆ هاوکاری
            </a>
        </div>

        <div class="footer-brand">PROXO TEAM</div>
    </div>

    <script>
        const targetDate = new Date("March 31, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.querySelectorAll(".t-num").forEach(el => el.innerText = "00");
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("d").innerText = days.toString().padStart(2, '0');
            document.getElementById("h").innerText = hours.toString().padStart(2, '0');
            document.getElementById("m").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("s").innerText = seconds.toString().padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
