<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <title>Proxo Builder - Optimized Smoothness V17</title>
    <style>
        @font-face {
            font-family: 'Rudaw';
            src: url('https://cdn.jsdelivr.net/gh/Zana-Sponsor/Zana-Sponsor@main/new_rudaw_bold.woff2');
            font-display: swap;
        }
        body { font-family: 'Rudaw', sans-serif; background: #0b1120; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .setup-container { background: #1e293b; padding: 25px; border-radius: 15px; border: 1px solid #3b82f6; width: 100%; max-width: 1000px; display: grid; grid-template-columns: 320px 1fr; gap: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .inputs { display: flex; flex-direction: column; gap: 10px; }
        input[type="text"] { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; font-family: 'Rudaw'; outline: none; width: 100%; box-sizing: border-box; }
        label { font-size: 12px; color: #94a3b8; margin-bottom: -5px; }
        .toggle-box { background: #0f172a; padding: 10px; border-radius: 8px; border: 1px solid #334155; margin-top: 5px; }
        .toggle-item { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-top: 8px; cursor: pointer; color: #e2e8f0; }
        textarea { background: #000; color: #10b981; padding: 15px; border-radius: 10px; border: 1px solid #10b981; font-family: monospace; height: 550px; resize: none; font-size: 11px; width: 100%; box-sizing: border-box; }
        .copy-btn { background: #3b82f6; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Rudaw'; margin-top: 10px; font-size: 16px; }
        .hidden-input { display: none; margin-top: 5px; margin-bottom: 10px; padding-right: 15px; }
    </style>
</head>
<body>

<div class="setup-container">
    <div class="inputs">
        <h3 style="margin:0 0 10px 0; color:#3b82f6; text-align:center;">Proxo Generator</h3>
        
        <label>ناوی بازرگانی</label>
        <input type="text" id="brand" placeholder="Proxo Team" oninput="generate()">
        
        <label>دوو پیتی لۆگۆ</label>
        <input type="text" id="initials" placeholder="P+T" maxlength="3" oninput="generate()">

        <label>لینکی وێنەی لۆگۆ</label>
        <input type="text" id="logoUrl" placeholder="https://..." oninput="generate()">
        
        <label>لینکی ڤیدیۆی تیکتۆک</label>
        <input type="text" id="videoLink" placeholder="https://vt.tiktok.com/..." oninput="generate()">

        <div class="toggle-box">
            <label style="display:block; margin-bottom:8px; color:#3b82f6;">دوگمەکان هەڵبژێرە:</label>
            
            <label class="toggle-item"><input type="checkbox" id="cWa" checked onchange="toggleExtra('cWa', 'wa-extra'); generate()"> واتسئاپ</label>
            <div id="wa-extra" class="hidden-input" style="display:block;"><input type="text" id="waVal" placeholder="9647500000000" oninput="generate()"></div>

            <label class="toggle-item"><input type="checkbox" id="cTg" onchange="toggleExtra('cTg', 'tg-extra'); generate()"> تێلیگرام</label>
            <div id="tg-extra" class="hidden-input"><input type="text" id="tgVal" placeholder="username" oninput="generate()"></div>

            <label class="toggle-item"><input type="checkbox" id="cVi" checked onchange="toggleExtra('cVi', 'vi-extra'); generate()"> ڤایبەر</label>
            <div id="vi-extra" class="hidden-input" style="display:block;"><input type="text" id="viVal" placeholder="ژمارە" oninput="generate()"></div>

            <label class="toggle-item"><input type="checkbox" id="cIg" checked onchange="toggleExtra('cIg', 'ig-extra'); generate()"> ئینستاگرام</label>
            <div id="ig-extra" class="hidden-input" style="display:block;"><input type="text" id="igVal" placeholder="یوزەر یان لینک" oninput="generate()"></div>

            <label class="toggle-item"><input type="checkbox" id="cPh" checked onchange="toggleExtra('cPh', 'ph-extra'); generate()"> کۆڕەک</label>
            <div id="ph-extra" class="hidden-input" style="display:block;"><input type="text" id="phVal" placeholder="ژمارە" oninput="generate()"></div>
            
            <label class="toggle-item"><input type="checkbox" id="cAs" checked onchange="toggleExtra('cAs', 'as-extra'); generate()"> ئاسیاسێڵ</label>
            <div id="as-extra" class="hidden-input" style="display:block;"><input type="text" id="asVal" placeholder="ژمارە" oninput="generate()"></div>
        </div>
    </div>

    <div style="display: flex; flex-direction: column;">
        <textarea id="output" readonly></textarea>
        <button class="copy-btn" onclick="copy()">کۆپی کردنی کۆدەکە 📋</button>
    </div>
</div>

<script>
function toggleExtra(checkId, extraId) {
    const cb = document.getElementById(checkId);
    const extra = document.getElementById(extraId);
    extra.style.display = cb.checked ? "block" : "none";
}

function generate() {
    const brand = document.getElementById('brand').value || "ناوی تۆ لێرە بنووسە";
    const initials = document.getElementById('initials').value || "P+T";
    const logoUrl = document.getElementById('logoUrl').value.trim();
    const videoParam = document.getElementById('videoLink').value.trim() || "https://vt.tiktok.com/...";

    const wa = document.getElementById('waVal').value.replace('+', '') || "9647518661260";
    const tg = document.getElementById('tgVal').value || "@username";
    const vi = document.getElementById('viVal').value || "9647518661260";
    const ig = document.getElementById('igVal').value || "@username";
    const ph = document.getElementById('phVal').value || "07518661260";
    const as = document.getElementById('asVal').value || "07701234567";

    let finalLogo = logoUrl !== "" ? logoUrl : "https://ui-avatars.com/api/?name=" + encodeURIComponent(initials) + "&background=0062AD&color=fff&size=200&bold=true";

    let activeButtons = [];
    if(document.getElementById('cWa').checked) activeButtons.push('wa');
    if(document.getElementById('cTg').checked) activeButtons.push('tg');
    if(document.getElementById('cIg').checked) activeButtons.push('ig');
    if(document.getElementById('cVi').checked) activeButtons.push('vi');
    if(document.getElementById('cPh').checked) activeButtons.push('ph');
    if(document.getElementById('cAs').checked) activeButtons.push('as');

    let btnHtml = '';
    let btnJs = '';
    const handHtml = '\n        <span id="click-hand" class="hand-container">\n            <span class="click-circle"></span>\n            <span class="finger-emoji">👆</span>\n        </span>';

    activeButtons.forEach((btn, index) => {
        let hasHand = (index === 0) ? handHtml : '';
        let shineClass = (index === 0) ? 'shine-active' : '';

        if(btn === 'wa') {
            btnHtml += '    <a id="wa-btn" class="link whatsapp ' + shineClass + '">\n        <i class="fab fa-whatsapp" style="font-size: 24px;"></i> \n        واتسئاپ ' + hasHand + '\n    </a>\n';
            btnJs += '    document.getElementById("wa-btn").onclick = function() { handleTrack("WhatsApp_Ku", "whatsapp://send?phone=' + wa + '&text=" + encodeURIComponent("سڵاو! زانیاریم دەوێت دەربارەی ئەمە:\\n" + "' + videoParam + '")); };\n';
        }
        if(btn === 'tg') {
            btnHtml += '    <a id="tg-btn" class="link telegram ' + shineClass + '">\n        <i class="fab fa-telegram"></i> \n        تێلیگرام ' + hasHand + '\n    </a>\n';
            btnJs += '    document.getElementById("tg-btn").onclick = function() { handleTrack("Telegram_Ku", "https://t.me/' + tg + '"); };\n';
        }
        if(btn === 'ig') {
            btnHtml += '    <a id="ig-btn" class="link instagram ' + shineClass + '"><i class="fab fa-instagram"></i> ئینستاگرام ' + hasHand + '</a>\n';
            btnJs += '    document.getElementById("ig-btn").onclick = function() { let url = "' + ig + '".includes("instagram.com") ? "' + ig + '" : "https://instagram.com/' + ig + '"; handleTrack("Insta_Ku", url); };\n';
        }
        if(btn === 'vi') {
            btnHtml += '    <a id="vb-btn" class="link viber ' + shineClass + '"><i class="fab fa-viber"></i> ڤایبەر ' + hasHand + '</a>\n';
            btnJs += '    document.getElementById("vb-btn").onclick = function() { handleTrack("Viber_Ku", "viber://chat?number=' + vi + '"); };\n';
        }
        if(btn === 'ph') {
            btnHtml += '    <a id="ph-btn" class="link phone ' + shineClass + '"><i class="fas fa-phone"></i> کۆڕەک ' + hasHand + '</a>\n';
            btnJs += '    document.getElementById("ph-btn").onclick = function() { handleTrack("Korek_Ku", "tel:' + ph + '"); };\n';
        }
        if(btn === 'as') {
            btnHtml += '    <a id="as-btn" class="link asiacell ' + shineClass + '"><i class="fas fa-phone"></i> ئاسیاسێڵ ' + hasHand + '</a>\n';
            btnJs += '    document.getElementById("as-btn").onclick = function() { handleTrack("Asia_Ku", "tel:' + as + '"); };\n';
        }
    });

    const template = `<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxo - Links</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@font-face { font-family: 'Rudaw'; src: url('https://raw.githubusercontent.com/Zana-Sponsor/Zana-Sponsor/main/new_rudaw_bold.woff2') format('woff2'); font-weight: bold; font-style: normal; font-display: swap; }
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
body{ margin:0; min-height:100vh; font-family:Rudaw,Arial,sans-serif; background:#ffffff; display:flex; align-items:center; justify-content:center; overflow-x: hidden;}
.container{ width:100%; max-width:380px; padding:36px 16px 40px; text-align:center; background:#fff; }
.profile{padding:18px 8px 10px; margin-bottom:24px;}
.profile img { width: 92px; height: 92px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; box-shadow: 0 6px 18px rgba(0,0,0,.12); padding: 1px; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
.profile h1{ margin:6px 0 6px; font-size:18px; color:#000; }
.profile p{ margin:10px 8px 0; font-size:14px; color:#373737; line-height:1.7; }
.links{ display:flex; flex-direction:column; gap:14px; margin:28px 0; }
.link{ position:relative; display:flex; align-items:center; justify-content:center; padding:14px 18px 14px 48px; border-radius:999px; font-size:16px; font-weight:700; color:#fff; text-decoration:none; min-height:48px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); text-shadow: 1px 1px 3px rgba(0,0,0,0.3); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; cursor: pointer; }
.link:active{ transform: scale(0.92); }
.link i{ position:absolute; left:18px; font-size:22px; text-align:center; width:26px; text-shadow: none !important; }
.whatsapp{background:#25D366;}
.telegram{background:#26A5E4;}
.viber{background:#7360f2;}
.phone{background:#0062AD}
.asiacell{background:#ff0000}
.instagram{background:linear-gradient(90deg,#f58529,#dd2a7b,#8134af,#515bd4);}
.shine-active::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent); transform: skewX(-25deg); animation: shine 2s infinite; }
@keyframes shine { 0% { left: -100%; } 100% { left: 150%; } }
.no-shine::after { animation: none !important; display: none !important; }
.hand-container { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 60px; height: 60px; z-index: 10; pointer-events: none; display: flex; align-items: center; justify-content: center; transition: opacity 0.8s ease-out; opacity: 1; }
.hand-container.hidden { opacity: 0 !important; }
.finger-emoji { font-size: 25px; position: relative; z-index: 2; animation: clickAnim 1s infinite; margin-left: 10px; margin-top: 15px; }
.click-circle { position: absolute; width: 25px; height: 25px; border: 3px solid rgba(255, 255, 255, 0.8); border-radius: 50%; animation: pulse 1s infinite; z-index: 1; }
@keyframes clickAnim { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.9); } }
@keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }
.divider{ width:100%; height:1px; margin:28px 0 18px; background:linear-gradient(to right, transparent, #ddd, transparent); }
.footer small{ display:block; font-size:10px; color:#656565; margin-bottom:8px; }
.footer img{ height:14px; margin:0 auto 6px; display:block; }
.legal{margin-top:10px; font-size:10px; color:#656565;}
.legal a{color:inherit; text-decoration:none; margin:0 6px;}
</style>
</head>
<body>
<div class="container">
  <div class="profile">
    <img src="${finalLogo}" alt="Logo">
    <h1>${brand}</h1>
    <p>بۆ زانیاری زیاتر، پەیوەندی بکە لەڕێگەی دوگمەکانەوە.</p>
  </div>
  <div class="links">${btnHtml}</div>
  <div class="divider"></div>
  <div class="footer">
    <small>سپۆنسەر کراوە لەلایەن</small>
    <a href="https://www.proxopages.com" target="_blank"><img src="https://image2url.com/r2/default/images/1772757087694-7bee9862-8ba7-44c2-9056-a4543f25aa32.webp" alt="Proxo"></a>
    <div class="legal">
      <a href="https://proxopages.com/policy" target="_blank">Privacy Policy</a> | 
      <a href="https://proxopages.com/terms" target="_blank">Terms & Conditions</a>
    </div>
  </div>
</div>
<script>
let isTracked = false;

function hideEffects() {
    const hand = document.getElementById('click-hand');
    const shineBtns = document.querySelectorAll('.shine-active');
    if(hand) hand.classList.add('hidden');
    shineBtns.forEach(btn => btn.classList.add('no-shine'));
}

function handleTrack(name, url) {
    hideEffects();
    if(window.ttq && !isTracked) {
        ttq.track("Contact", { content_id: "contact_button", content_name: name });
        isTracked = true;
    }
    setTimeout(() => { window.location.href = url; }, 150);
}

!function (w, d, t) {
  w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie","holdConsent","revokeConsent","grantConsent"],ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments, 0)))}};for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);ttq.instance=function(t){for(
var e=ttq._i[t]||[],n=0;n<ttq.methods.n;n++)ttq.setAndDefer(e,ttq.methods[n]);return e},ttq.load=function(e,n){var r="https://analytics.tiktok.com/i18n/pixel/events.js",o=n&&n.partner;ttq._i=ttq._i||{},ttq._i[e]=[],ttq._i[e]._u=r,ttq._t=ttq._t||{},ttq._t[e]=+new Date,ttq._o=ttq._o||{},ttq._o[e]=n||{};var s=document.createElement("script")
;s.type="text/javascript",s.async=!0,s.src=r+"?sdkid="+e+"&lib="+t;e=document.getElementsByTagName("script")[0];e.parentNode.insertBefore(s,e)};
  ttq.load('D6BIIA3C77U1CE9DCUMG');

document.addEventListener("DOMContentLoaded", function() {
${btnJs}
    setTimeout(function() {
        hideEffects();
    }, 6000);
});
<\/script>
</body>
</html>`;
    document.getElementById('output').value = template;
}

function copy() {
    const text = document.getElementById('output');
    text.select();
    document.execCommand('copy');
    alert("کۆدەکە بە تەواوی کۆپی کرا! ✅");
}
generate();
</script>
</body>
</html>
