<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxo - Links</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@font-face {
    font-family: 'Rudaw';
    /* لینکی ڕاستەوخۆی فایلەکە لە GitHub Raw */
    src: url('https://raw.githubusercontent.com/Zana-Sponsor/Zana-Sponsor/main/new_rudaw_bold.woff2') format('woff2');
    font-weight: bold;
    font-style: normal;
    font-display: swap; /* گرنگە بۆ خێرا پیشاندانی دەق */
}
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; font-family:Rudaw,Arial,sans-serif;
  background:#ffffff;
  display:flex; align-items:center; justify-content:center;
}

.container{
  width:100%;
  max-width:380px;
  padding:36px 16px 40px;
  text-align:center;
  background:#fff;
}

.profile{padding:18px 8px 10px; margin-bottom:24px;}
.profile img{
  width:92px;height:92px;border-radius:50%;object-fit:cover;margin-bottom:10px;
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}
.profile h1{margin:6px 0 6px; font-size:18px; color:#111;}
.profile p{margin:10px 8px 0; font-size:14px; color:#666; line-height:1.7;}

.links{display:flex; flex-direction:column; gap:14px; margin:28px 0 28px;}

.link{
  position:relative;
  display:flex; align-items:center; justify-content:center;
  padding:14px 18px 14px 48px;
  border-radius:999px;
  font-size:16px;
  font-weight:700;
  color:#fff; text-decoration:none;
  min-height:48px;
  box-shadow:0 8px 20px rgba(0,0,0,.12);
  transition:transform .12s ease, box-shadow .12s ease;
  overflow: hidden; /* پێویستە بۆ بریقەکە */
}
.link:active{transform:scale(.98)}

.link i{
  position:absolute;
  left:18px;
  font-size:20px;
  width:26px;
  text-align:center;
}

/* زیادکردنی بریقە بۆ واتسئاپ */
.whatsapp{background:#25D366; position:relative;}
.whatsapp::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
  transform: skewX(-25deg);
  animation: shine 5s infinite;
}

@keyframes shine {
  100% { left: 150%; }
}

.viber{background:#7360f2;}
.phone{background:#0062AD}
.asiacell{background:#ff0000}
.instagram{background:linear-gradient(90deg,#f58529,#dd2a7b,#8134af,#515bd4);}

.divider{width:100%; height:1px; margin:28px 0 18px; background:linear-gradient(to right, transparent, #ddd, transparent);}

.footer{text-align:center;}
.footer small{display:block; font-size:12px; color:#8b8b8b; margin-bottom:8px;}
.footer img{height:18px; width:auto; display:block; margin:0 auto 6px;}
.legal{margin-top:10px; font-size:11px; color:#aaa;}
.legal a{color:inherit; text-decoration:none; margin:0 6px;}
</style>
</head>
<body>

<div class="container">
  <div class="profile">
    <img src="https://image2url.com/r2/default/images/1772346506551-4eefe94a-6ecc-4e19-a453-8fdf08ef73d1.png" alt="Logo">
    <h1>جیهانی بۆن</h1>
    <p>بۆ زانیاری زیاتر، پەیوەندی بکە لەڕێگەی دوگمەکانەوە.</p>
  </div>

  <div class="links">
    <a id="wa-btn" class="link whatsapp"><i class="fab fa-whatsapp"></i> واتسئاپ</a>
    <a id="vb-btn" class="link viber"><i class="fab fa-viber"></i> ڤایبەر</a>
    <a id="ph-btn" class="link phone"><i class="fas fa-phone"></i> کۆڕەک</a>

  </div>

  <div class="divider"></div>

  <div class="footer">
    <small>سپۆنسەر کراوە لەلایەن</small>
    <a href="https://www.proxopages.com" target="_blank">
      <img src="https://image2url.com/r2/default/images/1772341251543-7af0365b-156d-4da9-8d00-99c497f16b70.png" alt="My Logo">
    </a>
    <div class="legal">
      <a href="https://proxopages.com/policy" target="_blank">Privacy Policy</a> | 
      <a href="https://proxopages.com/terms" target="_blank">Terms & Conditions</a>
    </div>
  </div>
</div>

document.addEventListener("DOMContentLoaded", function() {
    const videoParam = new URLSearchParams(window.location.search).get('v') || "https://vt.tiktok.com/ZSmGG58DN/";
    const message = encodeURIComponent("سڵاو! زانیاریم دەوێت دەربارەی ئەمە:\n" + videoParam);
    
    // کێشەی ئەپەکان: بەکارهێنانی `window.location.href` زۆرجار ڕێگری لێدەکرێت.
    // چارەسەر: بەکارهێنانی `window.open` یان لینککردنی ڕاستەوخۆ بە target="_blank"
    
    document.getElementById('wa-btn').onclick = function() { 
        if(window.ttq) ttq.track('Contact', { contents: [{ content_name: 'WhatsApp' }] }); 
        window.location.href = "https://wa.me/9647511040724?text=" + message; 
    };
    
    document.getElementById('vb-btn').onclick = function() { 
        if(window.ttq) ttq.track('Contact', { contents: [{ content_name: 'Viber' }] }); 
        window.location.href = "viber://chat?number=9647511040724"; 
    };
    
    document.getElementById('ph-btn').onclick = function() { 
        if(window.ttq) ttq.track('Contact', { contents: [{ content_name: 'Phone_Korek' }] }); 
        window.location.href = "tel:9647511040724"; 
    };
});
</script>

</body>
</html>
