<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tahina Barzan</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Rabar_021';
  src: url('https://raw.githubusercontent.com/Zana-Sponsor/Zana-Sponsor/main/Rabar_021.woff2') format('woff2');
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Rabar_021', sans-serif;
  background: #0d1021;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.page {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #0d1021;
}

.top-section {
  width: 100%;
  position: relative;
  margin-bottom: 0;
}

.gradient-bg {
  width: 100%;
  height: 190px;
  background: linear-gradient(to right, #5b1fa8 0%, #8b2fc9 40%, #b044d8 70%, #c855e0 100%);
  position: relative;
}

.gradient-bg::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 100%;
  height: 55px;
  background: #0d1021;
  border-radius: 50% 50% 0 0 / 55px 55px 0 0;
}

.avatar {
  position: absolute;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 4px solid #fff;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 4px 18px rgba(0,0,0,0.3);
  z-index: 10;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

.content {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 16px 50px;
  background: #0d1021;
}

.name {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  position: relative;
  top: -25px;
  margin-bottom: -10px;
}

.desc {
  font-size: 14px;
  color: #E0E0E0;
  line-height: 2;
  text-align: center;
  margin-top: 18px;
  padding: 0 6px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  margin-top: 40px;
}

.btn {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 18px 8px 15px;
  border-radius: 18px;
  font-size: 14px;
  font-weight: bold;
  color: #fff;
  min-height: 88px;
  cursor: pointer;
  text-decoration: none;
  overflow: hidden;
  transition: transform 0.13s;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
}
.btn:active { transform: scale(0.96); background: rgba(255,255,255,0.12); }

.btn-wa i { font-size: 28px; }
.btn-vb i { font-size: 25px; }
.btn-ph i { font-size: 22px; }
.btn-ig i { font-size: 25px; }

.btn-wa::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 50%; height: 100%;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.32), transparent);
  transform: skewX(-22deg);
  animation: shine 2.4s infinite;
}
.no-shine::after { display: none !important; }
@keyframes shine { 0%{left:-100%} 100%{left:160%} }

.hand {
  position: absolute; bottom: 6px; right: 9px;
  pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.8s;
}
.hand.hide { opacity: 0; }
.hand-emoji { font-size: 17px; animation: tap 1s infinite; position: relative; z-index: 2; }
.hand-ring  { position: absolute; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.85); border-radius: 50%; animation: ring 1s infinite; }
@keyframes tap  { 0%,100%{transform:scale(1)} 50%{transform:scale(0.87)} }
@keyframes ring { 0%{transform:scale(1);opacity:.8} 100%{transform:scale(2.2);opacity:0} }

.tt-badge {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(5px);
  color: #fff;
  text-decoration: none;
  display: flex;
  flex-direction: row-reverse;
  align-items: center;
  gap: 8px;
  padding: 7px 18px;
  border-radius: 90px;
  border: 1px solid rgba(255,255,255,0.1);
  position: relative;
  margin-top: 14px;
  margin-right: 2px;
  margin-right: auto;
  transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  font-family: 'Rabar_021', sans-serif;
  font-size: 14.5px;
  font-weight: 600;
}
.tt-badge::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: 50px;
  padding: 1.2px;
  background: linear-gradient(45deg, #69c9d0, #ee1d52);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask-composite: exclude;
  opacity: 0.6;
}
.tt-badge:active { transform: scale(0.95); }
.tt-badge i { font-size: 17px; }

.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  display: none; justify-content: center; align-items: center;
  z-index: 9999;
}
.modal-bg.show { display: flex; animation: fadeIn 0.2s ease; }
.modal-box {
  width: 85%; max-width: 320px;
  background: #16181d;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 35px 25px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}
.modal-box h3 { font-size: 20px; margin-bottom: 10px; }
.modal-box p  { font-size: 14px; color: #aaa; line-height: 1.7; margin-bottom: 25px; }
.m-btn {
  display: block; width: 100%;
  padding: 16px; border: none;
  border-radius: 16px;
  font-family: 'Rabar_021'; font-size: 15px; font-weight: bold;
  cursor: pointer; margin-bottom: 12px; color: #fff;
}
.m-cancel { font-size: 13px; color: #888; cursor: pointer; padding: 5px; display: inline-block; }
.m-wa { background: #28E16D; color: #000; }
.m-vb { background: #7360F2; }
.m-ph { background: #fff; color: #000; }
.m-ig { background: #dc2743; }

.footer {
  width: 100%;
  margin-top: 90px;
  padding-bottom: 28px;
  text-align: center;
}
.footer small { display: block; font-size: 11px; color: #8b8b8b; margin-bottom: 8px; }
.footer img   { height: 13px; display: block; margin: 0 auto 10px; }
.legal { font-size: 10px; color: #8b8b8b; }
.legal a { color: inherit; text-decoration: none; margin: 0 5px; }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<div class="modal-bg" id="modal">
  <div class="modal-box">
    <h3 id="m-title">...</h3>
    <p>ئایا دەتەوێت پەیوەندیمان پێوە بکەی؟</p>
    <button id="m-ok" class="m-btn" onclick="goLink()">بەڵێ، بەردەوام بە</button>
    <span class="m-cancel" onclick="closeModal()">پاشگەزبوونەوە</span>
  </div>
</div>

<div class="page">

  <div class="top-section">
    <div class="gradient-bg"></div>
    <div class="avatar">
      <img src="https://via.placeholder.com/100/a850cc/ffffff?text=TB" alt="Tahina Barzan">
    </div>
  </div>

  <div class="content">

    <h1 class="name">Tahina Barzan</h1>

    <p class="desc">
      پێویستت بە زانیاری زیاترە؟ پەیوەندیمان پێوە بکە لە ڕێگەی
      دووگمەکانی خوارەوە. تیمەکەمان بە خێرایی وەڵامت دەداتەوە.
    </p>

    <div class="grid">
      <a id="vb" class="btn btn-vb">
        <i class="fab fa-viber"></i>
        ڤایبەر
      </a>
      <a id="wa" class="btn btn-wa">
        <i class="fab fa-whatsapp"></i>
        واتسئاپ
        <span id="hand" class="hand">
          <span class="hand-ring"></span>
          <span class="hand-emoji">👆</span>
        </span>
      </a>
      <a id="ig" class="btn btn-ig">
        <i class="fab fa-instagram"></i>
        ئینستاگرام
      </a>
      <a id="ph" class="btn btn-ph">
        <i class="fas fa-phone"></i>
        کۆرەک
      </a>
    </div>

    <a href="https://www.tiktok.com/@tahinabarzan" target="_blank" class="tt-badge">
      <i class="fab fa-tiktok"></i>
      <span>@tahinabarzan</span>
    </a>

    <div class="footer">
      <small>سپۆنسەر کراوە لەلایەن</small>
      <a href="https://www.tiktok.com/@proxo_iq" target="_blank">
        <img src="https://image2url.com/r2/default/images/1772757087694-7bee9862-8ba7-44c2-9056-a4543f25aa32.webp" alt="Proxo">
      </a>
      <div class="legal">
        <a href="https://proxopages.com/policy" target="_blank">Privacy Policy</a> |
        <a href="https://proxopages.com/terms" target="_blank">Terms &amp; Conditions</a>
      </div>
    </div>

  </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
let selectedApp = '';
let selectedUrl = '';

function hideEffects() {
  const hand = document.getElementById('hand');
  const wa   = document.getElementById('wa');
  if (hand) hand.classList.add('hide');
  if (wa)   wa.classList.add('no-shine');
}

function ask(name, url, kurdishName, cls) {
  selectedApp = name;
  selectedUrl = url;
  document.getElementById('m-title').innerText = kurdishName;
  document.getElementById('m-ok').className = 'm-btn ' + cls;
  document.getElementById('modal').classList.add('show');
  if (navigator.vibrate) navigator.vibrate(25);
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

function goLink() {
  hideEffects();
  const lastTrackTime = localStorage.getItem('tt_contact_timestamp');
  const currentTime   = new Date().getTime();
  const twentyFourHours = 24 * 60 * 60 * 1000;
  if (window.ttq) {
    if (!lastTrackTime || (currentTime - lastTrackTime > twentyFourHours)) {
      ttq.track('Contact', { content_id: 'contact_button', content_name: selectedApp });
      localStorage.setItem('tt_contact_timestamp', currentTime);
    }
  }
  closeModal();
  setTimeout(() => { window.location.href = selectedUrl; }, 700);
}

!function (w, d, t) {
  w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie","holdConsent","revokeConsent","grantConsent"],ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments, 0)))}};for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);ttq.instance=function(t){for(var e=ttq._i[t]||[],n=0;n<ttq.methods.n;n++)ttq.setAndDefer(e,ttq.methods[n]);return e},ttq.load=function(e,n){var r="https://analytics.tiktok.com/i18n/pixel/events.js",o=n&&n.partner;ttq._i=ttq._i||{},ttq._i[e]=[],ttq._i[e]._u=r,ttq._t=ttq._t||{},ttq._t[e]=+new Date,ttq._o=ttq._o||{},ttq._o[e]=n||{};var s=document.createElement("script");s.type="text/javascript",s.async=!0,s.src=r+"?sdkid="+e+"&lib="+t;e=document.getElementsByTagName("script")[0];e.parentNode.insertBefore(s,e)};
  ttq.load('YOUR_PIXEL_ID');
  ttq.page();
}(window, document, 'ttq');

document.addEventListener('DOMContentLoaded', () => {
  const vUrl = decodeURIComponent(urlParams.get('v') || 'https://www.tiktok.com/@tahinabarzan');
  const msg  = 'سڵاو! زانیاریم دەوێت دەربارەی ئەمە:\n' + vUrl;

  document.getElementById('wa').onclick = () =>
    ask('WhatsApp', 'whatsapp://send?phone=YOUR_NUMBER&text=' + encodeURIComponent(msg), 'واتسئاپ', 'm-wa');
  document.getElementById('vb').onclick = () =>
    ask('Viber', 'viber://chat?number=YOUR_NUMBER&draft=' + encodeURIComponent(msg), 'ڤایبەر', 'm-vb');
  document.getElementById('ph').onclick = () =>
    ask('Phone', 'tel:YOUR_NUMBER', 'کۆرەک', 'm-ph');
  document.getElementById('ig').onclick = () =>
    ask('Instagram', 'https://instagram.com/tahinabarzan', 'ئینستاگرام', 'm-ig');

  window.onclick = e => { if (e.target.id === 'modal') closeModal(); };
  setTimeout(hideEffects, 10000);
});
</script>
</body>
</html>
