<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>‌Proxo - Links</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@font-face {
    font-family: 'Rudaw';
    src: url('https://raw.githubusercontent.com/Zana-Sponsor/Zana-Sponsor/main/new_rudaw_bold.woff2') format('woff2');
    font-weight: bold;
    font-style: normal;
    font-display: swap;
}
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; font-family:Rudaw,Arial,sans-serif;
  background:#ffffff;
  display:flex; align-items:center; justify-content:center;
}

.container{
  width:100%;
  max-width:380px;
  padding:36px 16px 40px;
  text-align:center;
  background:#fff;
}

.profile{padding:18px 8px 10px; margin-bottom:24px;}
.profile img{
  width:92px;height:92px;border-radius:50%;object-fit:cover;margin-bottom:10px;
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}
.profile h1{margin:6px 0 6px; font-size:18px; color:#000000;}
.profile p{margin:10px 8px 0; font-size:14px; color:#000000; line-height:1.7;}

.links{display:flex; flex-direction:column; gap:14px; margin:28px 0 28px;}

.link{
  position:relative;
  display:flex; align-items:center; justify-content:center;
  padding:14px 18px 14px 48px;
  border-radius:999px;
  font-size:16px;
  font-weight:700;
  color:#fff; text-decoration:none;
  min-height:48px;
  box-shadow:0 8px 20px rgba(0,0,0,.12);
  transition:transform .12s ease, box-shadow .12s ease;
  overflow: hidden;
  will-change: transform;
}
.link:active{transform:scale(.98)}

.link i{
  position:absolute;
  left:18px;
  font-size:20px;
  width:26px;
  text-align:center;
}

.whatsapp{background:#25D366; position:relative;}

/* زیادکردنی بریقە بۆ واتسئاپ */
.whatsapp::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
  transform: skewX(-25deg);
  /* بریقەکە بەردەوام دەبێت تا JS دەیوەستێنێت */
  animation: shine 2s infinite;
}

@keyframes shine {
  0% { left: -100%; }
  100% { left: 150%; }
}

/* کلاسێک بۆ وەستاندنی بریقە */
.whatsapp.no-shine::after {
  animation: none;
  display: none;
}

/* container بۆ پەنجە و بازنە */
.hand-container {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    width: 60px;
    height: 60px;
    z-index: 10;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s ease-out;
    opacity: 1;
}

/* کلاسێک بۆ ئەوەی ئیمۆجیەکە ون بێت */
.hand-container.hidden {
    opacity: 0;
}

/* خودی ئیمۆجی پەنجەکە */
.finger-emoji {
    font-size: 25px;
    position: relative;
    z-index: 2;
    animation: clickAnim 1s infinite;
    /* زیادکردنی margin بۆ گۆڕینی شوێن */
    margin-left: 10px;
    margin-top: 15px;
}

/* بازنە خڕەکە (پەنجەمۆر) */
.click-circle {
    position: absolute;
    width: 25px;
    height: 25px;
    border: 3px solid rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    animation: pulse 1s infinite;
    z-index: 1;
}

/* ئانیمەیشنی پەنجە */
@keyframes clickAnim {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(0.9); }
}

/* ئانیمەیشنی بازنە خڕەکە */
@keyframes pulse {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(2.5); opacity: 0; }
}

.viber{background:#7360f2;}
.phone{background:#0062AD}
.asiacell{background:#ff0000}
.instagram{background:linear-gradient(90deg,#f58529,#dd2a7b,#8134af,#515bd4);}

.divider{width:100%; height:1px; margin:28px 0 18px; background:linear-gradient(to right, transparent, #ddd, transparent);}

.footer{text-align:center;}
.footer small{display:block; font-size:10px; color:#656565; margin-bottom:8px;}
.footer img{height:14px; width:auto; display:block; margin:0 auto 6px;}
.legal{margin-top:10px; font-size:10px; color:#656565;}
.legal a{color:inherit; text-decoration:none; margin:0 6px;}
</style>
</head>
<body>

<div class="container">
  <div class="profile">
    <img src="https://image2url.com/r2/default/images/1772394252329-fa5c6c41-d75e-428c-bdcd-6d1096a2c611.blob" alt="Logo">
    <h1>کارمەند حاجی علی پێنجوێنی</h1>
    <p>بۆ گەیاندنی هاوکاریەکانتان، یەکێک لەدووگمەکان دابگرە.</p>
  </div>

  <div class="links">
    <a id="wa-btn" class="link whatsapp">
        <i class="fab fa-whatsapp"></i> 
        واتسئاپ 
        <span id="click-hand" class="hand-container">
            <span class="click-circle"></span>
            <span class="finger-emoji">👆</span>
        </span>
    </a>
    <a id="ph-btn" class="link phone" href="tel:07501143894"><i class="fas fa-phone"></i> کۆڕەک</a>
    <a id="as-btn" class="link asiacell" href="tel:07701403880"><i class="fas fa-phone"></i> ئاسیاسێڵ</a>

  </div>

  <div class="divider"></div>

  <div class="footer">
    <small>سپۆنسەر کراوە لەلایەن</small>
    <a href="https://www.proxopages.com" target="_blank">
      <img src="https://image2url.com/r2/default/images/1772341251543-7af0365b-156d-4da9-8d00-99c497f16b70.png" alt="My Logo">
    </a>
    <div class="legal">
      <a href="https://proxopages.com/policy" target="_blank">Privacy Policy</a> | 
      <a href="https://proxopages.com/terms" target="_blank">Terms & Conditions</a>
    </div>
  </div>
</div>

    setTimeout(function() {
        var clickHand = document.getElementById('click-hand');

            clickHand.classList.add('hidden'); // ونبوونی ئیمۆجی

</body>
