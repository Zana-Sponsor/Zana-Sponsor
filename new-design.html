<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxo - Links</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* فۆنتی ڕووداو بۆڵد */
@font-face { 
    font-family: 'RudawBold'; 
    src: url('https://raw.githubusercontent.com/Zana-Sponsor/Zana-Sponsor/main/new_rudaw_bold.woff2') format('woff2'); 
    font-weight: bold; 
    font-style: normal; 
}

*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}

body {
    margin: 0;
    min-height: 100vh;
    font-family: 'RudawBold', Arial, sans-serif;
    background: radial-gradient(circle at center, #1e223a 0%, #0f111a 100%);
    display: flex;
    justify-content: center;
    overflow-x: hidden;
}

.container {
    width: 100%;
    max-width: 380px;
    min-height: 100vh; /* بۆ ئەوەی بەرزی شاشەکە بگرێتەوە */
    padding: 20px 16px 30px; 
    text-align: center;
    background: transparent; 
    display: flex;
    flex-direction: column; /* توخمەکان بە ستوونی ڕیز دەکات */
}

.profile {
    padding: 0 8px 5px; 
    margin-bottom: 5px; /* کەمکردنەوەی بۆشایی بۆ بردنە سەرەوە */
}

.profile img { 
    width: 105px; height: 105px; 
    border-radius: 50%; 
    object-fit: cover; 
    margin-bottom: 12px; 
    border: 2px solid rgba(255,255,255,0.2);
}

.profile h1 { 
    margin: 0 0 8px; 
    font-size: 18px; 
    color: #fff; 
    font-weight: bold; 
}

.profile p { 
    margin: 20px 10px 0; 
    font-size: 14px; 
    color: #DDDDDD; 
    line-height: 1.6; 
}

.links { 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
    margin: 20px 0; 
}

.link { 
    position: relative; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    padding: 12px 18px; 
    border-radius: 14px; 
    font-size: 17px; 
    color: #fff; 
    text-decoration: none; 
    min-height: 60px; 
    background: rgba(255, 255, 255, 0.07); 
    border: 1px solid rgba(255, 255, 255, 0.15); 
    transition: all 0.2s ease;
    cursor: pointer; 
}

.link:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.12); }

.link i {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.fa-whatsapp { font-size: 28px; }
.fa-viber { font-size: 25px; }
.fa-phone { font-size: 22px; }

/* بردنە خوارەوەی بەشی کۆتایی */
.footer { 
    margin-top: 80px; /* فووتەرەکە پاڵ دەنێت بۆ کۆتایی */
    padding-top: 30px;
}

.footer small { display: block; font-size: 11px; color: #CECECE; margin-bottom: 8px; }
.footer img { height: 15px; margin: 0 auto 10px; display: block; filter: brightness(1.3); }
.legal { font-size: 11px; color: #CECECE; margin-top: 10px; padding-bottom: 10px; }
.legal a { color: inherit; text-decoration: none; margin: 0 6px; }

/* ئەنیمەیشنی دەستەکە */
.hand-container { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; }
.finger-emoji { font-size: 24px; animation: clickAnim 1s infinite; display: block; }
@keyframes clickAnim { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.8); } }
</style>
</head>
<body>

<div class="container">
  <div class="profile">
    <img src="https://image2url.com/r2/default/images/1772756949098-d6d76b46-8ea1-4475-a900-a41c4bec7bc4.webp" alt="Logo">
    <h1>عقارات شکۆی نەورۆز</h1>
    <p>بۆ زانیاری زیاتر، پەیوەندی بکە لەڕێگەی دوگمەکانەوە. تیمەکەمان ئامادەن بۆ وەڵام دانەوەت.</p>
  </div>

  <div class="links">
    <a id="wa-btn" class="link">
        <i class="fab fa-whatsapp"></i> واتسئاپ 
        <span id="click-hand" class="hand-container">
            <span class="finger-emoji">👆</span>
        </span>
    </a>
    <a id="vb-btn" class="link"><i class="fab fa-viber"></i> ڤایبەر </a>
    <a id="ph-btn" class="link"><i class="fas fa-phone"></i> کۆڕەک </a>
  </div>

  <div class="footer">
    <small>سپۆنسەر کراوە لەلایەن</small>
    <a href="https://www.proxopages.com" target="_blank"><img src="https://image2url.com/r2/default/images/1772757087694-7bee9862-8ba7-44c2-9056-a4543f25aa32.webp" alt="Proxo"></a>
    <div class="legal">
      <a href="https://proxopages.com/policy" target="_blank">Privacy Policy</a> | 
      <a href="https://proxopages.com/terms" target="_blank">Terms & Conditions</a>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("wa-btn").onclick = function() { window.location.href = "https://wa.me/9647507252570"; };
    document.getElementById("vb-btn").onclick = function() { window.location.href = "viber://chat?number=9647507252570"; };
    document.getElementById("ph-btn").onclick = function() { window.location.href = "tel:9647507252570"; };
});
</script>

</body>
</html>
