<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxo Admin Ultimate - Budget Added</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --border: #334155;
        }

        body { font-family: 'Vazirmatn', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1400px; margin: 0 auto; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid var(--border); position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
        .stat-card i { position: absolute; left: -10px; bottom: -15px; font-size: 80px; opacity: 0.15; color: var(--primary); transform: rotate(-15px); }
        .stat-card h3 { margin: 0; font-size: 14px; color: #94a3b8; z-index: 1; }
        .stat-card p { margin: 10px 0 0; font-size: 26px; font-weight: 800; color: var(--text); z-index: 1; }

        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; align-items: end; }
        input, select { background: #0f172a; border: 1px solid var(--border); border-radius: 10px; padding: 10px; color: white; font-family: inherit; width: 100%; box-sizing: border-box; }

        .table-wrap { background: var(--card); border-radius: 20px; overflow-x: auto; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; text-align: right; min-width: 1000px; }
        th { background: rgba(15, 23, 42, 0.5); padding: 18px; font-size: 13px; color: #94a3b8; border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); vertical-align: middle; }

        .inline-edit-input { background: #0f172a; border: 1px solid var(--border); color: var(--primary); font-weight: 800; padding: 5px; border-radius: 5px; width: 85px; text-align: center; }
        .budget-input { color: #10b981 !important; border-color: #10b98144; }

        .btn-circle { width: 38px; height: 38px; border-radius: 10px; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; color: white; transition: 0.3s; margin: 0 2px; }
        .btn-link { background: var(--accent); }
        .btn-del { background: var(--danger); }
        .btn-add { background: var(--primary); font-weight: 800; width: 100% !important; height: 45px; cursor: pointer; border-radius: 10px; border: none; color: white; font-family: inherit; }

        .thumb { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; }
        .saving-effect { animation: blink 0.5s ease-in-out; }
        @keyframes blink { 50% { background: #10b98133; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h1 style="background: linear-gradient(to left, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;">PROXO TEAM</h1>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>کۆی بینین</h3><p id="total-imp">0</p><i class="fas fa-eye"></i></div>
        <div class="stat-card"><h3>کۆی کلیک</h3><p id="total-clicks">0</p><i class="fas fa-mouse-pointer"></i></div>
        <div class="stat-card"><h3>کۆی خەرجی</h3><p id="total-spend">$0</p><i class="fas fa-dollar-sign"></i></div>
        <div class="stat-card"><h3>ڕیکلامە چالاکەکان</h3><p id="active-ads">0</p><i class="fas fa-bolt"></i></div>
    </div>

    <div class="glass-panel">
        <div class="form-grid" id="adForm">
            <input type="text" id="custName" placeholder="ناوی کڕیار">
            <input type="text" id="adId" placeholder="TikTok Ad ID">
            <input type="number" id="adBudget" placeholder="بڕی دۆلار $">
            <input type="text" id="imgUrl" placeholder="لینکی وێنە">
            <input type="datetime-local" id="startDate">
            <input type="datetime-local" id="endDate">
            <button onclick="addNewAd()" class="btn-add">زیادکردن</button>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>وێنە</th>
                    <th>کڕیار / ID</th>
                    <th>💰 بڕی دۆلار ($)</th>
                    <th>👁️ بینین</th>
                    <th>🖱️ کلیک</th>
                    <th>💵 خەرجی ($)</th>
                    <th>دۆخ</th>
                    <th>کردارەکان</th>
                </tr>
            </thead>
            <tbody id="ads-list"></tbody>
        </table>
    </div>
</div>

<script>
    const SB_URL = 'https://rtbsblgaewmfiynhwgkv.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0YnNibGdhZXdtZml5bmh3Z2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzODIwNDcsImV4cCI6MjA4Njk1ODA0N30.-aEC48G8Hltu6N8y2nPhAYPdB-4PSsR78OSXSLMAGcU';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    async function fetchAds() {
        const { data, error } = await supabaseClient.from('ads1').select('*').order('created_at', { ascending: false });
        if (!error) { renderAds(data); updateStats(data); }
    }

    function updateStats(ads) {
        document.getElementById('total-imp').innerText = ads.reduce((a, b) => a + (b.impressions || 0), 0).toLocaleString();
        document.getElementById('total-clicks').innerText = ads.reduce((a, b) => a + (b.clicks || 0), 0).toLocaleString();
        document.getElementById('total-spend').innerText = '$' + ads.reduce((a, b) => a + (b.spend || 0), 0).toFixed(2);
        document.getElementById('active-ads').innerText = ads.filter(a => a.status === 'active').length;
    }

    function renderAds(ads) {
        const list = document.getElementById('ads-list');
        list.innerHTML = ads.map(ad => `
            <tr id="row-${ad.id}">
                <td><img src="${ad.thumbnail_url || 'https://via.placeholder.com/45'}" class="thumb"></td>
                <td>
                    <div style="font-weight:800; color:white;">${ad.customer_name}</div>
                    <small style="color:#64748b;">ID: ${ad.tiktok_ad_id}</small>
                </td>
                <td><input type="number" class="inline-edit-input budget-input" value="${ad.budget || 0}" onchange="fastUpdate('${ad.id}', 'budget', this.value, this)"></td>
                <td><input type="number" class="inline-edit-input" value="${ad.impressions || 0}" onchange="fastUpdate('${ad.id}', 'impressions', this.value, this)"></td>
                <td><input type="number" class="inline-edit-input" value="${ad.clicks || 0}" onchange="fastUpdate('${ad.id}', 'clicks', this.value, this)"></td>
                <td><input type="number" step="0.1" class="inline-edit-input" value="${ad.spend || 0}" onchange="fastUpdate('${ad.id}', 'spend', this.value, this)"></td>
                <td>
                    <select onchange="fastUpdate('${ad.id}', 'status', this.value, this)" style="width:110px; background:#0f172a; color:white; border:1px solid #334155;">
                        <option value="active" ${ad.status === 'active' ? 'selected' : ''}>Active</option>
                        <option value="completed" ${ad.status === 'completed' ? 'selected' : ''}>Completed</option>
                        <option value="scheduled" ${ad.status === 'scheduled' ? 'selected' : ''}>Scheduled</option>
                    </select>
                </td>
                <td>
                    <button class="btn-circle btn-link" onclick="copyLiveLink('${ad.id}')" title="Copy Link"><i class="fas fa-link"></i></button>
                    <button class="btn-circle btn-del" onclick="deleteAd('${ad.id}')" title="Delete"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    async function fastUpdate(id, field, value, el) {
        let val;
        if (field === 'spend' || field === 'budget') val = parseFloat(value);
        else if (field === 'status') val = value;
        else val = parseInt(value);

        const { error } = await supabaseClient.from('ads1').update({ [field]: val }).eq('id', id);
        if (!error) {
            el.parentElement.parentElement.classList.add('saving-effect');
            setTimeout(() => el.parentElement.parentElement.classList.remove('saving-effect'), 500);
            updateStatsLocally();
        }
    }

    async function updateStatsLocally() {
        const { data } = await supabaseClient.from('ads1').select('*');
        if (data) updateStats(data);
    }

    function copyLiveLink(id) {
        const url = `https://proxopages.com/live?id=${id}`;
        navigator.clipboard.writeText(url).then(() => { alert("✅ لینکی تایبەتی کڕیار کۆپی کرا!"); });
    }

    async function addNewAd() {
        const payload = {
            customer_name: document.getElementById('custName').value,
            tiktok_ad_id: document.getElementById('adId').value,
            budget: parseFloat(document.getElementById('adBudget').value) || 0,
            thumbnail_url: document.getElementById('imgUrl').value,
            start_date: document.getElementById('startDate').value || new Date().toISOString(),
            end_date: document.getElementById('endDate').value || new Date().toISOString(),
            status: 'active', impressions: 0, clicks: 0, spend: 0
        };
        const { error } = await supabaseClient.from('ads1').insert([payload]);
        if (!error) { fetchAds(); document.querySelectorAll('#adForm input').forEach(i => i.value = ''); }
        else { alert("هەڵەیەک لە سەیڤکردن ڕوویدا"); }
    }

    async function deleteAd(id) {
        if (confirm("دڵنیای لە سڕینەوە؟")) { await supabaseClient.from('ads1').delete().eq('id', id); fetchAds(); }
    }

    window.onload = fetchAds;
</script>
</body>
</html>
