<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxo - Links</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@font-face { font-family: 'NRT-Bd'; src: url('https://raw.githubusercontent.com/Zana-Sponsor/Zana-Sponsor/main/NRT-Bd (1).woff2') format('woff2'); font-weight: bold; font-style: normal; }
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
body { margin: 0; min-height: 100vh; font-family: 'NRT-Bd'; display: flex; justify-content: center; overflow-x: hidden; }
.container { width: 100%; max-width: 380px; min-height: 100vh; padding: 20px 16px 30px; text-align: center; display: flex; flex-direction: column; }
.profile { padding: 0 8px 5px; margin-bottom: 5px; }
.links { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
.link { position: relative; display: flex; align-items: center; justify-content: center; padding: 12px 18px; text-decoration: none; cursor: pointer; overflow: hidden; transition: all 0.2s ease; }

body { background: radial-gradient(circle at center, #1e223a 0%, #0f111a 100%); }
.profile img { width: 105px; height: 105px; border-radius: 50%; object-fit: contain; margin-bottom: 0px; border: 3px solid #38bdf8; padding: 3px;}
.profile h1 { color: #ffffff; margin: 8px 0 0; font-size: 19px; letter-spacing: -0.5px; }
.profile p { color: #EBEBEB; font-size: 14px; line-height: 1.7; margin: 25px 0px 25px; font-weight: normal; }
.link { border-radius: 15px; font-size: 17px; background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.15); color: #fff; transition: all 0.2s ease; min-height: 58px; font-weight: bold; }
.link:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.12); }
.link i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); width: 30px; display: flex; align-items: center; justify-content: center; }
.fa-whatsapp { font-size: 28px; } .fa-viber { font-size: 25px; } .fa-phone { font-size: 22px; } .fa-telegram { font-size: 25px; } .fa-instagram { font-size: 25px; }
@keyframes shine { 0% { left: -100%; } 100% { left: 150%; } }
.no-shine::after { animation: none !important; display: none !important; }
.hand-container { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 60px; height: 60px; z-index: 10; pointer-events: none; display: flex; align-items: center; justify-content: center; transition: opacity 0.8s ease-out; opacity: 1; }
.hand-container.hidden { opacity: 0; }
.finger-emoji { font-size: 25px; position: relative; z-index: 2; animation: clickAnim 1s infinite; margin-left: 10px; margin-top: 15px; }
.click-circle { position: absolute; width: 25px; height: 25px; border: 3px solid rgba(255, 255, 255, 0.8); border-radius: 50%; animation: pulse 1s infinite; z-index: 1; }
@keyframes clickAnim { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.9); } }
@keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }
.footer { margin-top: 200px; padding: 50px 0 20px; }
.footer small { display: block; font-size: 9px; margin-bottom: 8px; color: #8b8b8b; }
.footer img { height: 14px; margin: 0 auto 10px; display: block; }
.legal { font-size: 9px; margin-top: 8px; padding-bottom: 10px; color: #8b8b8b; }
.legal a { color: inherit; text-decoration: none; margin: 0 6px; }
</style>
</head>
<body>
<div class="container">
  <div class="profile">
    <img src="https://image2url.com/r2/default/images/1775515544529-fd6ca7b4-5713-44d1-b36c-a27d824fd837.webp" alt="Logo">
    <h1>Farman Mobilyat</h1>
    <p>هەرئێستا پەیوەندیمان پێوە بکە. تیمەکانمان لەسەر هێڵن بۆ وەڵام دانەوەی هەر پرسیارێک.</p>
  </div>
  <div class="links"><a id="wa-btn" class="link "><i class="fab fa-whatsapp"></i> واتسئاپ <span id="click-hand" class="hand-container"><span class="click-circle"></span><span class="finger-emoji">👆</span></span></a>
    <a id="vb-btn" class="link "><i class="fab fa-viber"></i> ڤایبەر </a>
    <a id="ph-btn" class="link "><i class="fas fa-phone"></i> پەیوەندی </a>
    </div>
  <div class="footer">
    <small>سپۆنسەر کراوە لەلایەن</small>
    <a href="https://www.proxopages.com" target="_blank"><img src="https://image2url.com/r2/default/images/1772757087694-7bee9862-8ba7-44c2-9056-a4543f25aa32.webp" alt="Proxo"></a>
    <div class="legal">
      <a href="https://proxopages.com/policy" target="_blank">Privacy Policy</a> | 
      <a href="https://proxopages.com/terms" target="_blank">Terms & Conditions</a>
    </div>
  </div>
</div>
<script>
const urlParams = new URLSearchParams(window.location.search);
let isTracked = false;

function hideEffects() {
    const hand = document.getElementById('click-hand');
    const shineBtn = document.querySelector('.shine-active');
    if(hand) hand.classList.add('hidden');
    if(shineBtn) shineBtn.classList.add('no-shine');
}

function handleTrack(name, url) {
    hideEffects();
    if(window.ttq && !isTracked) {
        ttq.track("Contact", { content_id: "contact_button", content_name: name });
        isTracked = true;
    }
    setTimeout(() => { window.location.href = url; }, 300);
}

document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("wa-btn").onclick = function() { 
                    const vUrl = decodeURIComponent(urlParams.get('v') || "https://vt.tiktok.com/ZSHfMGuhM/?fbclid=IwZXh0bgNhZW0CMTEAc3J0YwZhcHBfaWQPNDM3NjI2MzE2OTczNzg4AAEeX9Rb7q0chp52N1RgyUCvA7WZNSYX2Q-FcSs_Bi1i8elFjYZCox0kDjSkg7M_aem_72tAE6Z3eAjA-CScQFddug");
                    const msg = "سڵاو! زانیاریم دەوێت دەربارەی ئەمە:\n" + vUrl;
                    handleTrack("WhatsApp", "https://wa.me/9647507813039?text=" + encodeURIComponent(msg)); 
                };
    document.getElementById("vb-btn").onclick = function() { 
                    const vUrl = decodeURIComponent(urlParams.get('v') || "https://vt.tiktok.com/ZSHfMGuhM/?fbclid=IwZXh0bgNhZW0CMTEAc3J0YwZhcHBfaWQPNDM3NjI2MzE2OTczNzg4AAEeX9Rb7q0chp52N1RgyUCvA7WZNSYX2Q-FcSs_Bi1i8elFjYZCox0kDjSkg7M_aem_72tAE6Z3eAjA-CScQFddug");
                    const msg = "سڵاو! زانیاریم دەوێت دەربارەی ئەمە:\n" + vUrl;
                    handleTrack("Viber", "viber://chat?number=9647507813039&draft=" + encodeURIComponent(msg)); 
                };
    document.getElementById("ph-btn").onclick = function() { handleTrack("Phone", "tel:9647507813039"); };
    
    setTimeout(hideEffects, 10000);
});
</script>
</body>
</html>
