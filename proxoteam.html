<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxo - Links</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="preconnect" href="https://analytics.tiktok.com">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" media="print" onload="this.media='all'">

<!-- Meta Pixel -->

n.callMethod.apply(n,arguments):n.queue.push(arguments)};

<noscript>

<style>
@font-face { font-family: 'Rudaw'; src: url('https://cdn.jsdelivr.net/gh/Zana-Sponsor/Zana-Sponsor@main/new_rudaw_bold.ttf') format('truetype'); font-display: swap; }
:root{ --bg:#0f172a; --card:rgba(30,41,59,.85); --text:#f8fafc; --proxo-blue:#3b82f6; --tg-color:#24A1DE; }
body{ font-family:'Rudaw', Arial, sans-serif; background:var(--bg); color:var(--text); margin:0; min-height:100vh; display:flex; justify-content:center; align-items:center; overflow-x:hidden; }
.container{ width:90%; max-width:350px; text-align:center; }
.profile-container{ background:var(--card); backdrop-filter:blur(10px); padding:25px 20px; border-radius:22px; border:1px solid rgba(255,255,255,.1); margin-bottom:35px; }
.profile-img{ width:80px; height:80px; border-radius:50%; object-fit:cover; margin-bottom:12px; border:2px solid rgba(255,255,255,0.2); }
h1{ font-size:18px; margin:0 0 12px; font-weight:700; }
.main-instruction{ font-size:13px; color:#aabbd3; }
.links-wrapper{ display:flex; flex-direction:column; gap:16px; width:100%; }
.link-card{ position:relative; display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-radius:15px; text-decoration:none; color:#fff; font-size:17px; font-weight:700; transition:transform .2s ease; cursor:pointer; border:none; width:100%; box-sizing:border-box; overflow:hidden; }
.link-card:active{ transform:scale(.97); }
.whatsapp{ background:linear-gradient(135deg,#075E54 0%,#1EA851 100%); }
.phone{ background:linear-gradient(135deg,#0062AD 0%,#00457A 100%); }
.asiacell{ background:linear-gradient(135deg,#ff0000 0%,#a30000 100%); }
.link-card i{ font-size:24px; }
</style>
</head>

<body>
<div class="container">
  <div class="profile-container">
    <img src="https://image2url.com/r2/default/images/1772228284787-4ad2f9f9-c92f-42ec-8263-948492a6bb1d.jpg" class="profile-img" alt="Logo" loading="lazy">
    <h1>Proxo Team</h1>
    <div class="main-instruction">بۆ پەیوەندی کردن، کلیک لەم لینکانەی خوارەوە بکەن</div>
  </div>

  <div class="links-wrapper">
    <button id="wa-btn" class="link-card whatsapp">
      <span>واتسئاپ</span><i class="fab fa-whatsapp"></i>
    </button>
    <button id="phone-btn" class="link-card phone">
      <span>کۆڕەک</span><i class="fas fa-phone-alt"></i>
    </button>
    <button id="asia-btn" class="link-card asiacell">
      <span>ئاسیاسێڵ</span><i class="fas fa-phone-alt"></i>
    </button>
  </div>
</div>

<!-- TikTok Pixel -->
<script>
!function (w, d, t) {
  w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];
  ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie","holdConsent","revokeConsent","grantConsent"];
  ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments, 0)))}}; 
  for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);
  ttq.load('D6BIIA3C77U1CE9DCUMG');
  ttq.page();
}(window, document, 'ttq');
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const videoParam = new URLSearchParams(window.location.search).get('v') || "";
  const message = encodeURIComponent("سڵاو! زانیاریم دەوێت دەربارەی ئەمە:\n" + videoParam);

  document.getElementById('wa-btn').onclick = function() {
    if (window.ttq) ttq.track('Contact', { contents: [{ content_name: 'WhatsApp' }] });
    if (window.fbq) fbq('track', 'Contact', { method: 'WhatsApp' });
    setTimeout(() => { window.location.href = "https://wa.me/9647758887488?text=" + message; }, 150);
  };

  document.getElementById('phone-btn').onclick = function() {
    if (window.ttq) ttq.track('Contact', { contents: [{ content_name: 'Phone_Korek' }] });
    if (window.fbq) fbq('track', 'Contact', { method: 'Korek' });
    setTimeout(() => { window.location.href = "tel:07510074008"; }, 150);
  };

  document.getElementById('asia-btn').onclick = function() {
    if (window.ttq) ttq.track('Contact', { contents: [{ content_name: 'Phone_Asiacell' }] });
    if (window.fbq) fbq('track', 'Contact', { method: 'Asiacell' });
    setTimeout(() => { window.location.href = "tel:07758887488"; }, 150);
  };
});
</script>

</body>
</html>
