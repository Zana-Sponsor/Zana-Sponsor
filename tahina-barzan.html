<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tahina Barzan</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Rabar';
  src: url('https://raw.githubusercontent.com/Zana-Sponsor/Zana-Sponsor/main/Rabar_021.woff2') format('woff2');
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Rabar', sans-serif;
  background: #fff;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.page {
  width: 100%;
  max-width: 430px;
  background: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ════════════════════════════
   بەشی سەرەوە:
   - gradient-bg بەرزیی دیاریکراو
   - وێنە position:absolute لەناوی gradient
   - هێڵی سپی ::after لەخوارەی gradient
   ════════════════════════════ */

.top-section {
  width: 100%;
  position: relative;
  /* بەرزی کۆی = gradient(190px) + نیوەی وێنەی دەکەوێتەخوارەوە(50px) */
  margin-bottom: 0;
}

.gradient-bg {
  width: 100%;
  height: 190px;
  background: linear-gradient(to right, #5b1fa8 0%, #8b2fc9 40%, #b044d8 70%, #c855e0 100%);
  position: relative;
}

/* هێڵی کەوانی سپی */
.gradient-bg::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 100%;
  height: 55px;
  background: #fff;
  border-radius: 50% 50% 0 0 / 55px 55px 0 0;
}

/* وێنەی پرۆفایل لەناوەڕاستی gradient */
.avatar {
  position: absolute;
  /* top = (190 - 55 - 100) / 2 = ~17px  بۆ ئەوەی ناوەڕاستی بەشی خاڵص بێت */
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 4px solid #fff;
  overflow: hidden;
  background: #ddd;
  box-shadow: 0 4px 18px rgba(0,0,0,0.2);
  z-index: 10;
}
.avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

/* ════════════════════════════
   ناوەڕۆک: دەستپێک لەخوارەی top-section
   ════════════════════════════ */

.content {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 16px 50px;
}

/* ناوی پرۆفایل — ڕاستەوخۆ لەخوارەی هێڵی سپی */
.name {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: #111;
  text-align: center;
  position: relative;
  top: -25px;
  margin-bottom: -10px;
}

.desc {
  font-size: 14px;
  color: #222;
  line-height: 2;
  text-align: center;
  margin-top: 18px;
  padding: 0 6px;
}

/* ════════════════════════════
   گریدی دووگمەکان — 2 ستون
   واتسئاپ چەپ، ڤایبەر ڕاست (لە RTL)
   یەنی HTML: واتسئاپ یەکەم، ڤایبەر دووەم
   ════════════════════════════ */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  margin-top: 40px;
}

.btn {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 18px 8px 15px;
  border-radius: 18px;
  font-family: 'Rabar', sans-serif;
  font-size: 14px;
  font-weight: bold;
  color: #fff;
  min-height: 88px;
  cursor: pointer;
  text-decoration: none;
  overflow: hidden;
  transition: transform 0.13s;
}
.btn:active { transform: scale(0.96); }
.btn i { font-size: 28px; }

/* ڕەنگی فەرمی هەر ئەپێک */
.btn-wa { background: #25D366; }
.btn-vb { background: #7360F2; }
.btn-ph { background: #25D366; }
.btn-ig { background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }

/* شاین لەسەر واتسئاپ */
.btn-wa::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 50%; height: 100%;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.32), transparent);
  transform: skewX(-22deg);
  animation: shine 2.4s infinite;
}
.no-shine::after { display: none !important; }
@keyframes shine { 0%{left:-100%} 100%{left:160%} }

/* دەستەی کلیک */
.hand {
  position: absolute; bottom: 6px; right: 9px;
  pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.8s;
}
.hand.hide { opacity: 0; }
.hand-emoji { font-size: 17px; animation: tap 1s infinite; position: relative; z-index: 2; }
.hand-ring  { position: absolute; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.85); border-radius: 50%; animation: ring 1s infinite; }
@keyframes tap  { 0%,100%{transform:scale(1)}  50%{transform:scale(0.87)} }
@keyframes ring { 0%{transform:scale(1);opacity:.8} 100%{transform:scale(2.2);opacity:0} }

/* ════════════════════════════
   TikTok badge — دەستەی چەپ
   لە RTL: margin-right:auto = چەپ
   ════════════════════════════ */
.tt-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #7b35c1;
  color: #fff;
  text-decoration: none;
  padding: 11px 20px 11px 16px;
  border-radius: 50px;
  font-family: 'Inter', sans-serif;
  font-size: 14.5px;
  font-weight: 600;
  margin-top: 14px;
  margin-right: auto;   /* چەپ لە RTL */
  transition: transform 0.18s;
}
.tt-badge:active { transform: scale(0.95); }
.tt-badge i { font-size: 17px; }

/* ════════════════════════════
   مۆدال
   ════════════════════════════ */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px);
  display: none; justify-content: center; align-items: center;
  z-index: 9999;
}
.modal-bg.show { display: flex; animation: fadeIn 0.17s ease; }
.modal-box {
  width: 84%; max-width: 308px;
  background: #fff; color: #111;
  border-radius: 22px;
  padding: 32px 22px;
  text-align: center;
  box-shadow: 0 18px 50px rgba(0,0,0,0.22);
}
.modal-box h3 { font-size: 19px; margin-bottom: 10px; }
.modal-box p  { font-size: 13px; color: #555; line-height: 1.7; margin-bottom: 20px; }
.m-btn {
  display: block; width: 100%;
  padding: 13px; border: none;
  border-radius: 13px;
  font-family: 'Rabar'; font-size: 15px; font-weight: bold;
  cursor: pointer; margin-bottom: 11px; color: #fff;
}
.m-cancel { font-size: 13px; color: #999; cursor: pointer; padding: 4px; display: inline-block; }
.m-wa, .m-ph { background: #25D366; }
.m-vb { background: #7360F2; }
.m-ig { background: #dc2743; }

/* ════════════════════════════
   فووتەر
   ════════════════════════════ */
.footer {
  width: 100%;
  margin-top: 90px;
  padding-bottom: 28px;
  text-align: center;
}
.footer small { display: block; font-size: 11px; color: #bbb; margin-bottom: 8px; }
.footer img   { height: 13px; display: block; margin: 0 auto 10px; }
.legal { font-size: 10px; color: #bbb; }
.legal a { color: inherit; text-decoration: none; margin: 0 5px; }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<!-- مۆدال -->
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <h3 id="m-title">...</h3>
    <p>ئایا دەتەوێت پەیوەندیمان پێوە بکەی؟</p>
    <button id="m-ok" class="m-btn" onclick="goLink()">بەڵێ، بەردەوام بە</button>
    <span class="m-cancel" onclick="closeModal()">پاشگەزبوونەوە</span>
  </div>
</div>

<div class="page">

  <!-- بەشی سەرەوە: gradient + وێنە -->
  <div class="top-section">
    <div class="gradient-bg"></div>
    <div class="avatar">
      <img src="https://via.placeholder.com/100/a850cc/ffffff?text=TB" alt="Tahina Barzan">
    </div>
  </div>

  <!-- ناوەڕۆک -->
  <div class="content">

    <h1 class="name">Tahina Barzan</h1>

    <p class="desc">
      پێویستت بە زانیاری زیاترە؟ پەیوەندیمان پێوە بکە لە ڕێگەی
      دووگمەکانی خوارەوە. تیمەکەمان بە خێرایی وەڵامت دەداتەوە.
    </p>

    <!-- ترتیب: واتسئاپ یەکەم (چەپ لە RTL)، ڤایبەر دووەم (ڕاست) -->
    <div class="grid">
      <a id="wa" class="btn btn-wa">
        <i class="fab fa-whatsapp"></i>
        واتسئاپ
        <span id="hand" class="hand">
          <span class="hand-ring"></span>
          <span class="hand-emoji">👆</span>
        </span>
      </a>
      <a id="vb" class="btn btn-vb">
        <i class="fab fa-viber"></i>
        ڤایبەر
      </a>
      <a id="ph" class="btn btn-ph">
        <i class="fas fa-phone"></i>
        کۆرەک
      </a>
      <a id="ig" class="btn btn-ig">
        <i class="fab fa-instagram"></i>
        ئینستاگرام
      </a>
    </div>

    <a href="https://www.tiktok.com/@tahinabarzan" target="_blank" class="tt-badge">
      <i class="fab fa-tiktok"></i>
      <span>@tahinabarzan</span>
    </a>

    <div class="footer">
      <small>سپۆنسەر کراوە لەلایەن</small>
      <a href="https://www.tiktok.com/@proxo_iq" target="_blank">
        <img src="https://image2url.com/r2/default/images/1772757087694-7bee9862-8ba7-44c2-9056-a4543f25aa32.webp" alt="Proxo">
      </a>
      <div class="legal">
        <a href="https://proxopages.com/policy" target="_blank">Privacy Policy</a> |
        <a href="https://proxopages.com/terms" target="_blank">Terms &amp; Conditions</a>
      </div>
    </div>

  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
let _app = '', _url = '';

function getMsg() {
  const v = decodeURIComponent(params.get('v') || 'https://www.tiktok.com/@tahinabarzan');
  return 'سڵاو! زانیاریم دەوێت دەربارەی ئەمە:\n' + v;
}

function ask(app, url, label, cls) {
  _app = app; _url = url;
  document.getElementById('m-title').innerText = label;
  document.getElementById('m-ok').className = 'm-btn ' + cls;
  document.getElementById('modal').classList.add('show');
  if (navigator.vibrate) navigator.vibrate(25);
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

function goLink() {
  // شاینەکە و دەستەکە بکوژێنەوە
  const wa = document.getElementById('wa');
  const h  = document.getElementById('hand');
  if (wa) wa.classList.add('no-shine');
  if (h)  h.classList.add('hide');
  closeModal();
  setTimeout(() => { window.location.href = _url; }, 700);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('wa').onclick = () =>
    ask('wa', 'whatsapp://send?phone=YOUR_NUMBER&text=' + encodeURIComponent(getMsg()), 'واتسئاپ', 'm-wa');
  document.getElementById('vb').onclick = () =>
    ask('vb', 'viber://chat?number=YOUR_NUMBER&draft=' + encodeURIComponent(getMsg()), 'ڤایبەر', 'm-vb');
  document.getElementById('ph').onclick = () =>
    ask('ph', 'tel:YOUR_NUMBER', 'کۆرەک', 'm-ph');
  document.getElementById('ig').onclick = () =>
    ask('ig', 'https://instagram.com/tahinabarzan', 'ئینستاگرام', 'm-ig');

  window.onclick = e => { if (e.target.id === 'modal') closeModal(); };

  // دەستەکە بکوژێنەوە پاش ١٠ چرکە
  setTimeout(() => {
    const h = document.getElementById('hand');
    if (h) h.classList.add('hide');
  }, 10000);
});
</script>
</body>
</html>
