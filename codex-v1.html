<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کۆددروستکەر - ProxoPages v2</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@font-face {
  font-family: 'Rabar_021';
  src: url('https://raw.githubusercontent.com/Zana-Sponsor/Zana-Sponsor/main/Rabar_021.woff2') format('woff2');
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Rabar_021', sans-serif;
  background: #080b18;
  color: #fff;
  min-height: 100vh;
  display: flex;
}

/* ── Sidebar ── */
.sidebar {
  width: 340px;
  min-width: 340px;
  background: #0d1021;
  border-left: 1px solid rgba(255,255,255,0.07);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow-y: auto;
  position: sticky;
  top: 0;
}
.sidebar-header {
  padding: 22px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.sidebar-header h2 {
  font-size: 16px;
  font-weight: 700;
  color: #c855e0;
  margin-bottom: 4px;
}
.sidebar-header p { font-size: 12px; color: #666; }

.template-select-wrap {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.template-select-wrap label { font-size: 12px; color: #888; display: block; margin-bottom: 6px; }
.template-select {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  padding: 10px 12px;
  border-radius: 10px;
  font-family: 'Rabar_021', sans-serif;
  font-size: 13px;
  cursor: pointer;
  outline: none;
}
.template-select:focus { border-color: #c855e0; }

.fields { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }

.field-group { display: flex; flex-direction: column; gap: 5px; }
.field-group label { font-size: 12px; color: #888; }
.field-group input, .field-group textarea, .field-group select {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  padding: 10px 12px;
  border-radius: 10px;
  font-family: 'Rabar_021', sans-serif;
  font-size: 13px;
  outline: none;
  width: 100%;
  transition: border-color 0.2s;
}
.field-group input:focus, .field-group textarea:focus, .field-group select:focus {
  border-color: #c855e0;
}
.field-group textarea { resize: vertical; min-height: 70px; line-height: 1.8; }

.section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #555;
  padding: 10px 0 2px;
  border-top: 1px solid rgba(255,255,255,0.05);
  margin-top: 4px;
}

/* ── Checkbox Button Selector ── */
.btn-checkbox-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.btn-checkbox-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.btn-checkbox-item:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(200,85,224,0.3);
}
.btn-checkbox-item.checked {
  background: rgba(200,85,224,0.1);
  border-color: rgba(200,85,224,0.5);
}

/* custom checkbox */
.custom-cb {
  width: 18px;
  height: 18px;
  min-width: 18px;
  border-radius: 5px;
  border: 2px solid rgba(255,255,255,0.2);
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.btn-checkbox-item.checked .custom-cb {
  background: #c855e0;
  border-color: #c855e0;
}
.custom-cb i {
  font-size: 10px;
  color: #fff;
  opacity: 0;
  transition: opacity 0.15s;
}
.btn-checkbox-item.checked .custom-cb i { opacity: 1; }

.cb-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}
.cb-icon-vb { background: rgba(115,96,242,0.2); color: #7360F2; }
.cb-icon-wa { background: rgba(40,225,109,0.15); color: #28E16D; }
.cb-icon-ig { background: rgba(220,39,67,0.15); color: #dc2743; }
.cb-icon-ph { background: rgba(255,255,255,0.1); color: #fff; }

.cb-label {
  flex: 1;
  font-size: 13px;
  color: #ccc;
}
.btn-checkbox-item.checked .cb-label { color: #fff; }

.cb-hint {
  font-size: 10px;
  color: #555;
  margin-top: 1px;
}
.btn-checkbox-item.checked .cb-hint { color: #a87cc8; }

/* btn fields area */
#btnFields { display: flex; flex-direction: column; gap: 10px; }

.btn-field-card {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px;
  background: rgba(255,255,255,0.03);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.07);
  animation: slideIn 0.2s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

.btn-field-card-header {
  font-size: 12px;
  color: #c855e0;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}

.generate-btn {
  margin: 0 20px 20px;
  padding: 14px;
  background: linear-gradient(135deg, #7b2fd4, #c855e0);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-family: 'Rabar_021', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  width: calc(100% - 40px);
}
.generate-btn:hover { opacity: 0.9; }
.generate-btn:active { transform: scale(0.98); }

.export-btn {
  margin: 0 20px 24px;
  padding: 12px;
  background: rgba(255,255,255,0.06);
  color: #aaa;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  font-family: 'Rabar_021', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  width: calc(100% - 40px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.export-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

/* ── Preview ── */
.preview-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 30px 20px;
  background: #080b18;
  overflow-y: auto;
}
.preview-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #444;
  margin-bottom: 16px;
}
.phone-frame {
  width: 390px;
  min-height: 700px;
  background: #0d1021;
  border-radius: 40px;
  border: 2px solid rgba(255,255,255,0.1);
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
  position: relative;
}
.phone-notch {
  width: 120px;
  height: 28px;
  background: #080b18;
  border-radius: 0 0 18px 18px;
  margin: 0 auto;
  position: relative;
  z-index: 100;
}

iframe#preview {
  width: 100%;
  height: 720px;
  border: none;
  display: block;
  border-radius: 0 0 38px 38px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <h2>ProxoPages Builder</h2>
    <p>دروستکردنی پەیجی پەیوەندی</p>
  </div>

  <div class="template-select-wrap">
    <label>تێمپڵ هەڵبژێرە</label>
    <select class="template-select" id="templateSelect" onchange="onTemplateChange()">
      <option value="tahina">Tahina Barzan</option>
    </select>
  </div>

  <div class="fields" id="fieldsArea">

    <!-- Basic Info -->
    <div class="section-title">زانیاری سەرەکی</div>

    <div class="field-group">
      <label>ناو</label>
      <input type="text" id="f_name" value="Tahina Barzan" oninput="livePreview()">
    </div>

    <div class="field-group">
      <label>وێنەی پرۆفایل (URL)</label>
      <input type="text" id="f_avatar" value="https://via.placeholder.com/100/a850cc/ffffff?text=TB" oninput="livePreview()">
    </div>

    <div class="field-group">
      <label>دەق پێناسەکردن</label>
      <textarea id="f_desc" oninput="livePreview()">پێویستت بە زانیاری زیاترە؟ پەیوەندیمان پێوە بکە لە ڕێگەی دووگمەکانی خوارەوە. تیمەکەمان بە خێرایی وەڵامت دەداتەوە.</textarea>
    </div>

    <!-- Buttons Checkbox Selector -->
    <div class="section-title">دووگمەکان — دیاریبکە کامەیان پیشان بدرێت</div>

    <div class="btn-checkbox-group" id="btnCheckboxGroup">
      <!-- rendered by JS -->
    </div>

    <!-- Dynamic fields for checked buttons -->
    <div id="btnFields"></div>

    <!-- Social -->
    <div class="section-title">تیکتۆک</div>

    <div class="field-group">
      <label>ئەکاونتی تیکتۆک (@username)</label>
      <input type="text" id="f_tt" value="@tahinabarzan" oninput="livePreview()">
    </div>
    <div class="field-group">
      <label>لینکی تیکتۆک</label>
      <input type="text" id="f_tt_url" value="https://www.tiktok.com/@tahinabarzan" oninput="livePreview()">
    </div>

    <!-- Pixel -->
    <div class="section-title">تیکتۆک پیکسل</div>
    <div class="field-group">
      <label>Pixel ID</label>
      <input type="text" id="f_pixel" placeholder="YOUR_PIXEL_ID" oninput="livePreview()">
    </div>

    <!-- Sponsor -->
    <div class="section-title">سپۆنسەر</div>
    <div class="field-group">
      <label>ناونیشانی سپۆنسەر (URL)</label>
      <input type="text" id="f_sponsor_url" value="https://www.tiktok.com/@proxo_iq" oninput="livePreview()">
    </div>
    <div class="field-group">
      <label>لۆگۆی سپۆنسەر (URL)</label>
      <input type="text" id="f_sponsor_logo" value="https://image2url.com/r2/default/images/1772757087694-7bee9862-8ba7-44c2-9056-a4543f25aa32.webp" oninput="livePreview()">
    </div>

  </div>

  <button class="generate-btn" onclick="generateAndPreview()">
    <i class="fas fa-bolt"></i> پیشاندانی ئەنجام
  </button>
  <button class="export-btn" onclick="exportHTML()">
    <i class="fas fa-download"></i> داگرتنی کۆد HTML
  </button>
  <button class="export-btn" onclick="copyHTML(this)" style="margin-top:-8px">
    <i class="fas fa-copy"></i> کۆپی کردنی کۆد
  </button>
</div>

<!-- Preview -->
<div class="preview-area">
  <div class="preview-label">پیشاندان</div>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <iframe id="preview" title="Preview"></iframe>
  </div>
</div>

<script>
// ─── Button definitions ───────────────────────────────────────
const BTN_DEFS = [
  { id: 'vb', label: 'ڤایبەر',     icon: 'fab fa-viber',     cls: 'btn-vb', type: 'viber',     phoneField: true,  cbCls: 'cb-icon-vb', defaultOn: true  },
  { id: 'wa', label: 'واتسئاپ',    icon: 'fab fa-whatsapp',  cls: 'btn-wa', type: 'whatsapp',  phoneField: true,  cbCls: 'cb-icon-wa', defaultOn: true, shine: true },
  { id: 'ig', label: 'ئینستاگرام', icon: 'fab fa-instagram', cls: 'btn-ig', type: 'instagram', phoneField: false, cbCls: 'cb-icon-ig', defaultOn: true  },
  { id: 'ph', label: 'کۆرەک',      icon: 'fas fa-phone',     cls: 'btn-ph', type: 'phone',     phoneField: true,  cbCls: 'cb-icon-ph', defaultOn: false },
];

// Track which buttons are checked
let checked = BTN_DEFS.map(b => b.defaultOn);

// ─── Render checkbox group ────────────────────────────────────
function renderCheckboxes() {
  const group = document.getElementById('btnCheckboxGroup');
  group.innerHTML = '';
  BTN_DEFS.forEach((def, i) => {
    const item = document.createElement('div');
    item.className = 'btn-checkbox-item' + (checked[i] ? ' checked' : '');
    item.innerHTML = `
      <div class="custom-cb"><i class="fas fa-check"></i></div>
      <div class="cb-icon ${def.cbCls}"><i class="${def.icon}"></i></div>
      <div>
        <div class="cb-label">${def.label}</div>
        <div class="cb-hint">${def.type}</div>
      </div>
    `;
    item.addEventListener('click', () => {
      checked[i] = !checked[i];
      renderCheckboxes();
      renderBtnFields();
      livePreview();
    });
    group.appendChild(item);
  });
}

// ─── Render input fields for checked buttons ──────────────────
function renderBtnFields() {
  const container = document.getElementById('btnFields');
  // Save current values before re-render
  BTN_DEFS.forEach((def, i) => {
    const lEl = document.getElementById(`bl_${i}`);
    const cEl = document.getElementById(`bc_${i}`);
    if (lEl) def._savedLabel   = lEl.value;
    if (cEl) def._savedContact = cEl.value;
  });

  container.innerHTML = '';
  BTN_DEFS.forEach((def, i) => {
    if (!checked[i]) return;
    const label   = def._savedLabel   !== undefined ? def._savedLabel   : def.label;
    const contact = def._savedContact !== undefined ? def._savedContact : '';

    const card = document.createElement('div');
    card.className = 'btn-field-card';
    card.innerHTML = `
      <div class="btn-field-card-header">
        <i class="${def.icon}"></i> ${def.label}
      </div>
      <div class="field-group">
        <label>ناوی دووگمە</label>
        <input type="text" id="bl_${i}" value="${label}" oninput="livePreview()">
      </div>
      <div class="field-group">
        <label>${def.phoneField ? 'ژمارە / لینک' : 'لینک (instagram.com/...)'}</label>
        <input type="text" id="bc_${i}" value="${contact}" oninput="livePreview()"
          placeholder="${def.type === 'instagram' ? 'instagram.com/username' : (def.phoneField ? '+9647XXXXXXXXX' : '')}">
      </div>
    `;
    container.appendChild(card);
  });
}

// ─── Collect checked button data ─────────────────────────────
function getActiveBtns() {
  return BTN_DEFS.filter((_, i) => checked[i]).map((def, _idx, _arr) => {
    const i = BTN_DEFS.indexOf(def);
    const labelEl   = document.getElementById(`bl_${i}`);
    const contactEl = document.getElementById(`bc_${i}`);
    return {
      ...def,
      label:   labelEl   ? labelEl.value   : def.label,
      contact: contactEl ? contactEl.value : '',
    };
  });
}

// ─── Template builder ─────────────────────────────────────────
function buildHTML() {
  const name       = document.getElementById('f_name').value || 'Tahina Barzan';
  const avatar     = document.getElementById('f_avatar').value;
  const desc       = document.getElementById('f_desc').value;
  const tt         = document.getElementById('f_tt').value;
  const ttUrl      = document.getElementById('f_tt_url').value;
  const pixel      = document.getElementById('f_pixel').value || 'YOUR_PIXEL_ID';
  const sponsorUrl  = document.getElementById('f_sponsor_url').value;
  const sponsorLogo = document.getElementById('f_sponsor_logo').value;

  const buttons = getActiveBtns();

  const btnHTML = (b) => `
      <a id="${b.id}" class="btn">
        <i class="${b.icon}"></i>
        ${b.label}
        ${b.shine ? `<span id="hand" class="hand"><span class="hand-ring"></span><span class="hand-emoji">👆</span></span>` : ''}
      </a>`;

  const ttBadge = `<a href="${ttUrl}" target="_blank" class="tt-badge">
        <i class="fab fa-tiktok"></i>
        <span>${tt}</span>
      </a>`;

  let gridHTML = '';
  let ttAfterGrid = '';

  if (buttons.length === 3) {
    gridHTML = `
      ${btnHTML(buttons[0])}
      ${btnHTML(buttons[1])}
      ${ttBadge}
      ${btnHTML(buttons[2])}`;
    ttAfterGrid = '';
  } else {
    gridHTML = buttons.map(b => btnHTML(b)).join('\n');
    ttAfterGrid = ttBadge;
  }

  const handlerLines = buttons.map(b => {
    const msg = `'سڵاو! زانیاریم دەوێت دەربارەی ئەمە:\\n' + vUrl`;
    let url = '';
    if (b.type === 'whatsapp')  url = `'whatsapp://send?phone=${b.contact || 'YOUR_NUMBER'}&text=' + encodeURIComponent(msg)`;
    else if (b.type === 'viber') url = `'viber://chat?number=${b.contact || 'YOUR_NUMBER'}&draft=' + encodeURIComponent(msg)`;
    else if (b.type === 'phone') url = `'tel:${b.contact || 'YOUR_NUMBER'}'`;
    else if (b.type === 'instagram') url = `'https://${b.contact || 'instagram.com/username'}'`;
    const mCls = `m-${b.type === 'instagram' ? 'ig' : b.type === 'whatsapp' ? 'wa' : b.type === 'viber' ? 'vb' : 'ph'}`;
    return `  document.getElementById('${b.id}').onclick = () =>
    ask('${b.type}', ${url}, '${b.label}', '${mCls}');`;
  }).join('\n');

  return `<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${name}</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Rabar_021';
  src: url('https://raw.githubusercontent.com/Zana-Sponsor/Zana-Sponsor/main/Rabar_021.woff2') format('woff2');
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Rabar_021', sans-serif; background: #0d1021; display: flex; justify-content: center; min-height: 100vh; }
.page { width: 100%; max-width: 430px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; background: #0d1021; }
.top-section { width: 100%; position: relative; margin-bottom: 0; }
.gradient-bg { width: 100%; height: 190px; background: linear-gradient(to right, #5b1fa8 0%, #8b2fc9 40%, #b044d8 70%, #c855e0 100%); position: relative; }
.gradient-bg::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 55px; background: #0d1021; border-radius: 50% 50% 0 0 / 55px 55px 0 0; }
.avatar { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); width: 100px; height: 100px; border-radius: 50%; border: 4px solid #fff; overflow: hidden; background: #fff; box-shadow: 0 4px 18px rgba(0,0,0,0.3); z-index: 10; }
.avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.content { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 0 16px 50px; background: #0d1021; }
.name { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 700; color: #fff; text-align: center; position: relative; top: -25px; margin-bottom: -10px; }
.desc { font-size: 14px; color: #E0E0E0; line-height: 2; text-align: center; margin-top: 18px; padding: 0 6px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 40px; }
.btn { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 18px 8px 15px; border-radius: 18px; font-size: 14px; font-weight: bold; color: #fff; min-height: 88px; cursor: pointer; text-decoration: none; overflow: hidden; transition: transform 0.13s; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); }
.btn:active { transform: scale(0.96); background: rgba(255,255,255,0.12); }
.btn i { font-size: 25px; }
.btn-wa::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.32), transparent); transform: skewX(-22deg); animation: shine 2.4s infinite; }
.no-shine::after { display: none !important; }
@keyframes shine { 0%{left:-100%} 100%{left:160%} }
.hand { position: absolute; bottom: 6px; right: 9px; pointer-events: none; display: flex; align-items: center; justify-content: center; transition: opacity 0.8s; }
.hand.hide { opacity: 0; }
.hand-emoji { font-size: 17px; animation: tap 1s infinite; position: relative; z-index: 2; }
.hand-ring { position: absolute; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.85); border-radius: 50%; animation: ring 1s infinite; }
@keyframes tap  { 0%,100%{transform:scale(1)} 50%{transform:scale(0.87)} }
@keyframes ring { 0%{transform:scale(1);opacity:.8} 100%{transform:scale(2.2);opacity:0} }
.tt-badge { background: rgba(255,255,255,0.03); backdrop-filter: blur(5px); color: #fff; text-decoration: none; display: flex; flex-direction: row-reverse; align-items: center; gap: 8px; padding: 7px 18px; border-radius: 90px; border: 1px solid rgba(255,255,255,0.1); position: relative; margin-top: 14px; margin-right: auto; transition: 0.3s cubic-bezier(0.4,0,0.2,1); font-family: 'Rabar_021', sans-serif; font-size: 14.5px; font-weight: 600; align-self: center; }
.tt-badge::before { content: ""; position: absolute; inset: -1px; border-radius: 50px; padding: 1.2px; background: linear-gradient(45deg, #69c9d0, #ee1d52); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude; opacity: 0.6; }
.tt-badge:active { transform: scale(0.95); }
.tt-badge i { font-size: 17px; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 9999; }
.modal-bg.show { display: flex; animation: fadeIn 0.2s ease; }
.modal-box { width: 85%; max-width: 320px; background: #16181d; color: #fff; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 35px 25px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
.modal-box h3 { font-size: 20px; margin-bottom: 10px; }
.modal-box p  { font-size: 14px; color: #aaa; line-height: 1.7; margin-bottom: 25px; }
.m-btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 16px; font-family: 'Rabar_021'; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 12px; color: #fff; }
.m-cancel { font-size: 13px; color: #888; cursor: pointer; padding: 5px; display: inline-block; }
.m-wa { background: #28E16D; color: #000; }
.m-vb { background: #7360F2; }
.m-ph { background: #fff; color: #000; }
.m-ig { background: #dc2743; }
.footer { width: 100%; margin-top: 90px; padding-bottom: 28px; text-align: center; }
.footer small { display: block; font-size: 11px; color: #8b8b8b; margin-bottom: 8px; }
.footer img   { height: 13px; display: block; margin: 0 auto 10px; }
.legal { font-size: 10px; color: #8b8b8b; }
.legal a { color: inherit; text-decoration: none; margin: 0 5px; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <h3 id="m-title">...</h3>
    <p>ئایا دەتەوێت پەیوەندیمان پێوە بکەی؟</p>
    <button id="m-ok" class="m-btn" onclick="goLink()">بەڵێ، بەردەوام بە</button>
    <span class="m-cancel" onclick="closeModal()">پاشگەزبوونەوە</span>
  </div>
</div>
<div class="page">
  <div class="top-section">
    <div class="gradient-bg"></div>
    <div class="avatar"><img src="${avatar}" alt="${name}"></div>
  </div>
  <div class="content">
    <h1 class="name">${name}</h1>
    <p class="desc">${desc}</p>
    <div class="grid">
      ${gridHTML}
    </div>
    ${ttAfterGrid}
    <div class="footer">
      <small>سپۆنسەر کراوە لەلایەن</small>
      <a href="${sponsorUrl}" target="_blank">
        <img src="${sponsorLogo}" alt="Sponsor">
      </a>
      <div class="legal">
        <a href="https://proxopages.com/policy" target="_blank">Privacy Policy</a> |
        <a href="https://proxopages.com/terms" target="_blank">Terms &amp; Conditions</a>
      </div>
    </div>
  </div>
</div>
<script>
const urlParams = new URLSearchParams(window.location.search);
let selectedApp = '';
let selectedUrl = '';
function hideEffects() {
  const hand = document.getElementById('hand');
  const wa   = document.getElementById('wa');
  if (hand) hand.classList.add('hide');
  if (wa)   wa.classList.add('no-shine');
}
function ask(name, url, kurdishName, cls) {
  selectedApp = name; selectedUrl = url;
  document.getElementById('m-title').innerText = kurdishName;
  document.getElementById('m-ok').className = 'm-btn ' + cls;
  document.getElementById('modal').classList.add('show');
  if (navigator.vibrate) navigator.vibrate(25);
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function goLink() {
  hideEffects();
  const lastTrackTime = localStorage.getItem('tt_contact_timestamp');
  const currentTime   = new Date().getTime();
  const twentyFourHours = 24 * 60 * 60 * 1000;
  if (window.ttq) {
    if (!lastTrackTime || (currentTime - lastTrackTime > twentyFourHours)) {
      ttq.track('Contact', { content_id: 'contact_button', content_name: selectedApp });
      localStorage.setItem('tt_contact_timestamp', currentTime);
    }
  }
  closeModal();
  setTimeout(() => { window.location.href = selectedUrl; }, 700);
}

  const vUrl = decodeURIComponent(urlParams.get('v') || '${ttUrl}');

// ─── Live preview ─────────────────────────────────────────────
function livePreview() {
  const html = buildHTML();
  const iframe = document.getElementById('preview');
  const blob = new Blob([html], { type: 'text/html' });
  iframe.src = URL.createObjectURL(blob);
}

function generateAndPreview() { livePreview(); }

function exportHTML() {
  const html = buildHTML();
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (document.getElementById('f_name').value || 'page').replace(/\s+/g, '-').toLowerCase() + '.html';
  a.click();
}

function copyHTML(btn) {
  navigator.clipboard.writeText(buildHTML()).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check"></i> کۆپی کرا!';
    btn.style.color = '#a3f5a3';
    setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 2000);
  });
}

function onTemplateChange() { livePreview(); }

// ─── Init ─────────────────────────────────────────────────────
renderCheckboxes();
renderBtnFields();
livePreview();
</script>
</body>
</html>
