<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@font-face {
    font-family: 'Rudaw';
    /* لینکی ڕاستەوخۆی فایلەکە لە GitHub Raw */
    src: url('https://raw.githubusercontent.com/Zana-Sponsor/Zana-Sponsor/main/new_rudaw_bold.woff2') format('woff2');
    font-weight: bold;
    font-style: normal;
    font-display: swap; /* گرنگە بۆ خێرا پیشاندانی دەق */
}
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; font-family:Rudaw,Arial,sans-serif;
  background:#ffffff;
  display:flex; align-items:center; justify-content:center;
}

.container{
  width:100%;
  max-width:380px;
  padding:36px 16px 40px;
  text-align:center;
  background:#fff;
}

.profile{padding:18px 8px 10px; margin-bottom:24px;}
.profile img{
  width:92px;height:92px;border-radius:50%;object-fit:cover;margin-bottom:10px;
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}
.profile h1{margin:6px 0 6px; font-size:18px; color:#111;}
.profile p{margin:10px 8px 0; font-size:14px; color:#666; line-height:1.7;}

.links{display:flex; flex-direction:column; gap:14px; margin:28px 0 28px;}

.link{
  position:relative;
  display:flex; align-items:center; justify-content:center;  /* ناوەکان ناوەڕاست */
  padding:14px 18px 14px 48px;   /* بۆ شوێن دانانی ئایکۆن لە چەپ */
  border-radius:999px;
  font-size:16px;
  font-weight:700;
  color:#fff; text-decoration:none;
  min-height:48px;
  box-shadow:0 8px 20px rgba(0,0,0,.12);
  transition:transform .12s ease, box-shadow .12s ease;
}
.link:active{transform:scale(.98)}

.link i{
  position:absolute;
  left:18px;                    /* ئایکۆن لە دەستە چەپ */
  font-size:20px;
  width:26px;
  text-align:center;
}

.whatsapp{background:#25D366;}
.viber{background:#7360f2;}
.messenger{background:#0b7cff;}
.instagram{background:linear-gradient(90deg,#f58529,#dd2a7b,#8134af,#515bd4);}

.divider{width:100%; height:1px; margin:28px 0 18px; background:linear-gradient(to right, transparent, #ddd, transparent);}

.footer{text-align:center;}
.footer small{display:block; font-size:12px; color:#8b8b8b; margin-bottom:8px;}
.footer img{height:18px; width:auto; display:block; margin:0 auto 6px;}
.legal{margin-top:10px; font-size:11px; color:#aaa;}
.legal a{color:inherit; text-decoration:none; margin:0 6px;}
</style>
</head>
<body>

<div class="container">
  <div class="profile">
    <img src="https://image2url.com/r2/default/images/1772343734168-42d3506e-9e2d-46e6-ab7d-264e132739cb.png" alt="Logo">
    <h1>جیهانی بۆن</h1>
    <p>بۆ زانیاری زیاتر، پەیوەندی بکە لەڕێگەی دوگمەکانەوە.</p>
  </div>

  <div class="links">
    <a id="wa-btn" class="link whatsapp">
      <i class="fab fa-whatsapp"></i>
      واتسئاپ
    </a>
    <a class="link viber" href="viber://chat?number=9647511040724">
      <i class="fab fa-viber"></i>
      ڤایبەر
    </a>
  </div>

  <div class="divider"></div>

  <div class="footer">
    <small>سپۆنسەر کراوە لەلایەن</small>
    <a href="https://www.proxopages.com" target="_blank">
      <img src="https://image2url.com/r2/default/images/1772341251543-7af0365b-156d-4da9-8d00-99c497f16b70.png" alt="My Logo">
    </a>
    <div class="legal">
      <a href="https://proxopages.com/policy" target="_blank">Privacy Policy</a> | 
      <a href="https://proxopages.com/terms" target="_blank">Terms & Conditions</a>
    </div>
  </div>
</div>

document.addEventListener("DOMContentLoaded", function() {
    setTimeout(function() {
      const emoji = document.getElementById('target-emoji');
      if (emoji) {
        emoji.style.transition = 'opacity 0.8s, transform 0.8s';
        emoji.style.opacity = '0'; emoji.style.transform = 'translateX(20px)';
        setTimeout(() => { emoji.style.display = 'none'; }, 800);
      }
    }, 5000);
    const videoParam = new URLSearchParams(window.location.search).get('v') || "https://vt.tiktok.com/ZSmtS99rF/";
    const message = encodeURIComponent("سڵاو! زانیاریم دەوێت دەربارەی ئەمە:\n" + videoParam);
    document.getElementById('wa-btn').onclick = function() { if(window.ttq) ttq.track('Contact', { contents: [{ content_name: 'WhatsApp' }] }); setTimeout(() => { window.location.href = "https://wa.me/9647758887488?text=" + message; }, 100); };
    document.getElementById('phone-btn').onclick = function() { if(window.ttq) ttq.track('Contact', { contents: [{ content_name: 'Phone_Korek' }] }); setTimeout(() => { window.location.href = "tel:07510074008"; }, 100); };
    document.getElementById('asia-btn').onclick = function() { if(window.ttq) ttq.track('Contact', { contents: [{ content_name: 'Phone_Asiacell' }] }); setTimeout(() => { window.location.href = "tel:07758887488"; }, 100); };
  });
</script>
</body>
</html>
